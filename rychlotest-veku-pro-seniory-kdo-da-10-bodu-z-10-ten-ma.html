<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rychlotest věku pro seniory: kdo dá 10 bodů z 10, ten má pořád mozek jako ve 30</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: Georgia, "Times New Roman", serif;
  background: #f5f0eb;
  color: #2c2c2c;
  margin: 0;
  padding: 24px 16px;
  line-height: 1.6;
}
.wrap { max-width: 720px; margin: 0 auto; }
h1 { font-size: 1.8rem; line-height: 1.3; color: #2c2c2c; margin: 0 0 16px; }
.perex { font-size: 1.1rem; color: #4a4a4a; margin: 0 0 28px; }
.q {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  padding: 28px;
  margin-bottom: 24px;
}
.q-text { font-weight: bold; font-size: 1.15rem; color: #2c2c2c; margin-bottom: 16px; }
.opt {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  background: #f7f4f0;
  border: 1px solid #d9d2c9;
  border-radius: 8px;
  font-size: 1rem;
  color: #3a3a3a;
  font-family: inherit;
  margin-bottom: 10px;
  cursor: pointer;
}
.opt:last-child { margin-bottom: 0; }
.opt:hover { background: #ede8e1; }
.opt.selected { background: #dcd3c7; border: 1px solid #a89e92; font-weight: bold; }
.opt.correct { background: #d4edda; border: 1px solid #7cb987; color: #1e5631; }
.opt.wrong { background: #f8d7da; border: 1px solid #d4848a; color: #721c24; }
.answer-input {
  width: 100%;
  padding: 14px 18px;
  font-family: inherit;
  font-size: 1rem;
  background: #f7f4f0;
  border: 1px solid #d9d2c9;
  border-radius: 8px;
  color: #3a3a3a;
  outline: none;
}
.answer-input:focus { background: #ede8e1; border-color: #a89e92; }
.answer-input:disabled { cursor: not-allowed; }
.q.correct .answer-input { background: #d4edda; border: 1px solid #7cb987; color: #1e5631; font-weight: bold; }
.q.wrong .answer-input { background: #f8d7da; border: 1px solid #d4848a; color: #721c24; }
.hint { margin-top: 12px; font-size: 0.95rem; color: #1e5631; font-style: italic; }
#submit, #retry {
  display: block;
  margin: 40px auto 0;
  padding: 16px 40px;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: bold;
  font-family: inherit;
  color: #fff;
  cursor: pointer;
}
#submit { background: #5b7e5f; }
#submit:hover { background: #4a6b4e; }
#submit:disabled { background: #b5b5b5; cursor: not-allowed; }
#retry { background: #8c7b6b; }
#retry:hover { background: #756658; }
.warn { text-align: center; color: #a04040; margin-top: 14px; min-height: 1.2em; }
#result {
  background: #fefcf9;
  border-top: 4px solid #5b7e5f;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  padding: 28px;
  margin-top: 32px;
}
#score { font-size: 2.5rem; font-weight: bold; color: #5b7e5f; text-align: center; margin-bottom: 12px; }
#verdict { font-size: 1rem; color: #4a4a4a; text-align: center; }
@media (max-width: 600px) { body { padding: 24px 16px; } h1 { font-size: 1.5rem; } .q { padding: 20px; } }
</style>
</head>
<body>
<div class="wrap">
<h1>Rychlotest věku pro seniory: kdo dá 10 bodů z 10, ten má pořád mozek jako ve 30</h1>
<p class="perex">Deset úloh na logiku, číselné řady, analogie a jazykový cit. Žádná školní fakta, jen rychlý test bystrosti vašeho mozku. Kdo dá všech deset, uvažuje pořád jako ve třiceti. Kolik zvládnete vy?</p>
<div id="quiz"></div>
<button id="submit" disabled>Vyhodnotit</button>
<div class="warn" id="warn"></div>
<div id="result" style="display:none;">
  <div id="score"></div>
  <div id="verdict"></div>
  <button id="retry">Zkusit znovu</button>
</div>
</div>
<script>
const questions = [
  { q: `Šepot je ke křiku tím, čím je ťukání k čemu?`, options: [`klepání`, `bušení`, `škrábání`, `tikání`], correct: 1 },
  { q: `Které z těchto slov je opakem slova „úsporný"?`, options: [`marnotratný`, `spořivý`, `skoupý`, `levný`], correct: 0 },
  { q: `Všechny růže v této zahradě jsou červené a v téže zahradě roste jedna bílá květina. Co z toho jistě plyne?`, options: [`v zahradě nerostou žádné růže`, `některé růže jsou bílé`, `bílá květina není růže`, `bílá květina je růže`], correct: 2 },
  { q: `Které číslo následuje v řadě 3, 6, 11, 18, 27, ?`, options: [`36`, `37`, `40`, `38`], correct: 3 },
  { q: `Teploměr je k teplotě tím, čím je váha k čemu?`, options: [`hmotnost`, `kilogram`, `tlak`, `objem`], correct: 0 },
  { q: `Eva je starší než Bára, Cyril je mladší než Bára a Dana je starší než Eva. Kdo je nejmladší?`, options: [`Bára`, `Cyril`, `Eva`, `Dana`], correct: 1 },
  { q: `Kolik je 17 × 14?`, answers: [`238`] },
  { q: `Které číslo následuje v řadě 2, 5, 11, 23, 47, ?`, answers: [`95`] },
  { q: `Kolik je 40 % z čísla 65?`, options: [`22`, `24`, `26`, `28`], correct: 2 },
  { q: `Co znamená, když je něčí odpověď „lakonická"?`, options: [`zdlouhavá a rozvláčná`, `lhostejná a chladná`, `uvolněná a bezstarostná`, `stručná a výstižná`], correct: 3 }
];

const answers = new Array(questions.length).fill(null);
let locked = false;

const quizEl = document.getElementById(`quiz`);
const submitBtn = document.getElementById(`submit`);
const warnEl = document.getElementById(`warn`);
const resultEl = document.getElementById(`result`);

function letter(i) { return [`a`, `b`, `c`, `d`][i]; }

function isOpen(item) { return Array.isArray(item.answers); }

function normalize(s) {
  return (s || ``).toString()
    .toLowerCase()
    .normalize(`NFD`)
    .replace(/[̀-ͯ]/g, ``)
    .replace(/\s+/g, ` `)
    .trim();
}

function render() {
  quizEl.innerHTML = ``;
  questions.forEach((item, qi) => {
    const box = document.createElement(`div`);
    box.className = `q`;
    const qt = document.createElement(`div`);
    qt.className = `q-text`;
    qt.textContent = (qi + 1) + `. ` + item.q;
    box.appendChild(qt);

    if (isOpen(item)) {
      const input = document.createElement(`input`);
      input.type = `text`;
      input.className = `answer-input`;
      input.placeholder = `Vaše odpověď`;
      if (answers[qi] !== null) input.value = answers[qi];
      input.addEventListener(`input`, () => {
        if (locked) return;
        answers[qi] = input.value.trim() === `` ? null : input.value;
        updateSubmit();
      });
      box.appendChild(input);
    } else {
      item.options.forEach((opt, oi) => {
        const btn = document.createElement(`button`);
        btn.className = `opt`;
        btn.textContent = letter(oi) + `) ` + opt;
        if (answers[qi] === oi) btn.classList.add(`selected`);
        btn.addEventListener(`click`, () => {
          if (locked) return;
          answers[qi] = oi;
          render();
          updateSubmit();
        });
        box.appendChild(btn);
      });
    }
    quizEl.appendChild(box);
  });
}

function updateSubmit() {
  const done = answers.every(a => a !== null && a !== ``);
  submitBtn.disabled = !done;
  if (done) warnEl.textContent = ``;
}

function evaluate() {
  if (!answers.every(a => a !== null && a !== ``)) {
    warnEl.textContent = `Odpovězte prosím na všechny otázky`;
    return;
  }
  locked = true;
  let score = 0;
  const boxes = quizEl.querySelectorAll(`.q`);
  questions.forEach((item, qi) => {
    const box = boxes[qi];
    if (isOpen(item)) {
      const input = box.querySelector(`.answer-input`);
      input.disabled = true;
      const ok = item.answers.some(a => normalize(a) === normalize(answers[qi]));
      if (ok) { box.classList.add(`correct`); score++; }
      else {
        box.classList.add(`wrong`);
        const hint = document.createElement(`div`);
        hint.className = `hint`;
        hint.textContent = `Správná odpověď: ` + item.answers[0];
        box.appendChild(hint);
      }
    } else {
      const opts = box.querySelectorAll(`.opt`);
      opts.forEach((btn, oi) => {
        btn.classList.remove(`selected`);
        if (oi === item.correct) btn.classList.add(`correct`);
        else if (oi === answers[qi]) btn.classList.add(`wrong`);
      });
      if (answers[qi] === item.correct) score++;
    }
  });
  submitBtn.disabled = true;
  showResult(score);
}

function verdictText(s) {
  if (s <= 3) return `Věk vašeho mozku vychází kolem 70 až 80 let. Rychlé úsudky a číselné řady vás dnes zaskočily a mozek volil pohodlnější cestu než tu správnou. Nic ztraceného, bystrost se dá probrat luštěním, počítáním z hlavy a hrou se slovy, a příště bude číslo nižší.`;
  if (s <= 6) return `Věk vašeho mozku vychází zhruba na 55 až 65 let. Půlku úloh jste rozlouskli s jistotou, u zbytku jste chvíli lovili vzorec nebo správný význam. Solidní střed přesně tam, kde se pohybuje většina svěžích seniorů.`;
  if (s <= 9) return `Věk vašeho mozku vychází kolem 40 až 50 let. Logika, řady i analogie vám naskakují svižně a chytáky vás skoro nezastaví. K plnému počtu chybělo opravdu málo a takovou hlavu vám leckdo mladší tiše závidí.`;
  return `Věk vašeho mozku vychází na skvělých 30 let, přesně jak slibuje titulek. Ani jedna past vás nezastavila, počítáte, uvažujete i vážíte slova jako člověk v nejlepších letech. Takhle bystře myslí jen menšina, a vy do ní patříte.`;
}

function showResult(score) {
  document.getElementById(`score`).textContent = score + ` z ` + questions.length;
  document.getElementById(`verdict`).textContent = verdictText(score);
  resultEl.style.display = `block`;
  resultEl.scrollIntoView({ behavior: `smooth` });
}

function reset() {
  for (let i = 0; i < answers.length; i++) answers[i] = null;
  locked = false;
  resultEl.style.display = `none`;
  warnEl.textContent = ``;
  submitBtn.disabled = true;
  render();
  window.scrollTo({ top: 0, behavior: `smooth` });
}

submitBtn.addEventListener(`click`, evaluate);
document.getElementById(`retry`).addEventListener(`click`, reset);
render();
</script>
</body>
</html>
