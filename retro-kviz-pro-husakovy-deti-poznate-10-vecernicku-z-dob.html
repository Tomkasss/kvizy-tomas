<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro kvíz pro Husákovy děti: poznáte 10 večerníčků z dob ČSSR podle obrázku?</title>
<style>
* { box-sizing: border-box; }
body { font-family: Georgia,"Times New Roman",serif; background:#f5f0eb; color:#2c2c2c; margin:0; padding:24px 16px; }
.wrap { max-width:720px; margin:0 auto; }
h1 { font-size:1.7rem; line-height:1.3; color:#2c2c2c; }
.perex { font-size:1.1rem; line-height:1.55; color:#4a4a4a; margin-bottom:8px; }
.q { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:28px; margin-bottom:24px; }
.q-text { font-weight:bold; font-size:1.15rem; color:#2c2c2c; margin-bottom:16px; }
.opt { display:block; width:100%; text-align:left; padding:14px 18px; background:#f7f4f0; border:1px solid #d9d2c9; border-radius:8px; font-size:1rem; color:#3a3a3a; margin-bottom:10px; cursor:pointer; font-family:inherit; }
.opt:hover { background:#ede8e1; }
.opt.selected { background:#dcd3c7; border:1px solid #a89e92; font-weight:bold; }
.opt.correct { background:#d4edda; border:1px solid #7cb987; color:#1e5631; }
.opt.wrong { background:#f8d7da; border:1px solid #d4848a; color:#721c24; }
.opt:disabled { cursor:default; }
#submit { background:#5b7e5f; color:#fff; padding:16px 40px; border-radius:8px; font-size:1.1rem; font-weight:bold; border:none; display:block; margin:40px auto 0; cursor:pointer; font-family:inherit; }
#submit:hover { background:#4a6b4e; }
#submit:disabled { background:#b5b5b5; cursor:not-allowed; }
.warn { text-align:center; color:#a05a5a; margin-top:14px; min-height:1.2em; }
#result { background:#fefcf9; border-top:4px solid #5b7e5f; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:28px; margin-top:24px; display:none; }
#score { font-size:2.5rem; font-weight:bold; color:#5b7e5f; text-align:center; margin:0 0 12px; }
#verdict { font-size:1rem; color:#4a4a4a; text-align:center; line-height:1.55; }
#retry { background:#8c7b6b; color:#fff; padding:16px 40px; border-radius:8px; font-size:1.1rem; font-weight:bold; border:none; display:block; margin:24px auto 0; cursor:pointer; font-family:inherit; }
#retry:hover { background:#756658; }
</style>
</head>
<body>
<div class="wrap">
<h1>Retro kvíz pro Husákovy děti: poznáte 10 večerníčků z dob ČSSR podle obrázku?</h1>
<p class="perex">Sedali jste každý večer u obrazovky, dokud Večerníček nezamával čepicí na dobrou noc? Deset večerníčkových hrdinů z časů ČSSR poznáte podle postav, prostředí i jejich tvůrců. Kolik jich dáte?</p>
<div id="quiz"></div>
<button id="submit" disabled>Vyhodnotit</button>
<p class="warn" id="warn"></p>
<div id="result">
<p id="score"></p>
<p id="verdict"></p>
<button id="retry">Zkusit znovu</button>
</div>
</div>
<script>
const questions = [
{ q: `Jakým řemeslem se loupežník Rumcajs živil, než ho starosta vyhnal z Jičína do lesa Řáholec?`, opts: [`ševcem`,`kovářem`,`bednářem`,`krejčím`], correct: 0 },
{ q: `Jak se jmenuje upovídaný motýl s cylindrem, kamarád Makové panenky?`, opts: [`Ferdinand`,`Matýsek`,`Emanuel`,`Kryšpín`], correct: 2 },
{ q: `Jak se jmenuje rybník, v němž bydlí zelený vodní skřítek Rákosníček?`, opts: [`Brčálník`,`Rákosí`,`Bahňák`,`Žabinec`], correct: 0 },
{ q: `Který výtvarník vytvořil charakteristickou podobu školáků Macha a Šebestové i jejich kouzelného sluchátka?`, opts: [`Zdeněk Smetana`,`Adolf Born`,`Radek Pilař`,`Zdeněk Miler`], correct: 1 },
{ q: `Pod jakým názvem začal roku 1968 vysílat večerníček o skřítcích Křemílkovi a Vochomůrkovi?`, opts: [`Pohádky z pařezové chaloupky`,`Pohádky z lesní studánky`,`Pohádky z lesního mechu`,`Pohádky z mechu a kapradí`], correct: 3 },
{ q: `Jak se jmenují dva uličničtí kosí bratři ze stejnojmenného večerníčku?`, opts: [`Kuba a Matěj`,`Josef a Václav`,`Vojta a Kvído`,`Tonda a Bartoloměj`], correct: 1 },
{ q: `Který herec proslul rolí mocného vládce hor Krakonoše v Krkonošských pohádkách?`, opts: [`František Peterka`,`Ilija Prachař`,`Jaroslav Satoranský`,`Zdeněk Řehoř`], correct: 0 },
{ q: `Jaký byl původní název večerníčku o psí dvojici Štaflíkovi a Špagetkovi?`, opts: [`Psí kusy`,`Čtyři tlapky`,`Psí život`,`Dva kamarádi`], correct: 2 },
{ q: `Který výtvarník dal podobu obřímu psu Fíkovi a jeho panince Áje?`, opts: [`Adolf Born`,`Zdeněk Miler`,`Radek Pilař`,`Jiří Šalamoun`], correct: 3 },
{ q: `Který herec namluvil všech třináct dílů večerníčku Říkání o víle Amálce?`, opts: [`Vlastimil Brodský`,`Jiří Hrzán`,`Karel Höger`,`Josef Dvořák`], correct: 1 }
];
const answers = new Array(questions.length).fill(null);
let locked = false;
const quizEl = document.getElementById('quiz');
const submitBtn = document.getElementById('submit');
const warnEl = document.getElementById('warn');
const letters = ['a','b','c','d'];

function render() {
  quizEl.innerHTML = '';
  questions.forEach((item, qi) => {
    const box = document.createElement('div');
    box.className = 'q';
    const qt = document.createElement('div');
    qt.className = 'q-text';
    qt.textContent = (qi+1) + '. ' + item.q;
    box.appendChild(qt);
    item.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = letters[oi] + ') ' + opt;
      if (answers[qi] === oi) btn.classList.add('selected');
      btn.addEventListener('click', () => {
        if (locked) return;
        answers[qi] = oi;
        render();
        updateSubmit();
      });
      box.appendChild(btn);
    });
    quizEl.appendChild(box);
  });
}
function updateSubmit() {
  const all = answers.every(a => a !== null);
  submitBtn.disabled = !all;
  if (all) warnEl.textContent = '';
}
submitBtn.addEventListener('click', () => {
  if (answers.some(a => a === null)) { warnEl.textContent = 'Odpovězte prosím na všechny otázky'; return; }
  locked = true;
  let score = 0;
  const boxes = quizEl.querySelectorAll('.q');
  boxes.forEach((box, qi) => {
    const opts = box.querySelectorAll('.opt');
    opts.forEach((btn, oi) => {
      btn.disabled = true;
      btn.classList.remove('selected');
      if (oi === questions[qi].correct) btn.classList.add('correct');
      else if (oi === answers[qi]) btn.classList.add('wrong');
    });
    if (answers[qi] === questions[qi].correct) score++;
  });
  showResult(score);
});
function showResult(score) {
  const scoreEl = document.getElementById('score');
  const verdictEl = document.getElementById('verdict');
  scoreEl.textContent = score + ' z 10';
  let text;
  if (score <= 3) text = 'Večerníček vám asi šuměl v pozadí, ale hrdiny už paměť zavála. Možná jste dobu ČSSR zastihli jen na okraji dětství, nebo se vám postavičky slily do jedné veselé změti. Zkuste zalistovat starými Sedmičkami pro maminku, leccos se vám samo vybaví.';
  else if (score <= 6) text = 'Poctivý průměr Husákova dítěte. Rumcajse i Rákosníčka poznáte na první dobrou, u výtvarníků, vypravěčů a méně omílaných jmen jste ale zaváhali. Přesně tady se scházívá většina těch, kdo u obrazovky vyrůstali.';
  else if (score <= 9) text = 'Výborný výkon. Kreslené hrdiny z časů ČSSR znáte do detailu, od pařezové chaloupky přes makové pole až po psí dvojku, co musela měnit název. K plnému počtu vám chybělo opravdu jen pár drobností, které si běžně nikdo nepamatuje.';
  else text = 'Plný počet a titul ostříleného pamětníka Večerníčku. Poznáte nejen postavy a prostředí, ale i tvůrce a hlasy za nimi. Kdo si po letech vybaví, že Amálku namluvil Jiří Hrzán a Krakonoše hrál František Peterka, ten dobu opravdu prožil. Tohle už mladší generace prostě nedají.';
  verdictEl.textContent = text;
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}
document.getElementById('retry').addEventListener('click', () => {
  locked = false;
  for (let i = 0; i < answers.length; i++) answers[i] = null;
  document.getElementById('result').style.display = 'none';
  warnEl.textContent = '';
  render();
  updateSubmit();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
render();
updateSubmit();
</script>
</body>
</html>
