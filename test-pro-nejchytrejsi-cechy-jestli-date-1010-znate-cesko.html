<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test pro nejchytřejší Čechy. Jestli dáte 10/10, znáte Česko jako svoje boty</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    margin: 0;
    padding: 24px 16px;
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.9rem; line-height: 1.3; color: #2c2c2c; }
  .perex { font-size: 1.1rem; color: #4a4a4a; margin-bottom: 8px; }
  .question {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .q-text { font-weight: bold; font-size: 1.15rem; color: #2c2c2c; margin-bottom: 16px; }
  .option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    font-size: 1rem;
    color: #3a3a3a;
    font-family: inherit;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background .15s;
  }
  .option:last-child { margin-bottom: 0; }
  .option:hover { background: #ede8e1; }
  .option.selected { background: #dcd3c7; border: 1px solid #a89e92; font-weight: bold; }
  .option.correct { background: #d4edda; border: 1px solid #7cb987; color: #1e5631; }
  .option.wrong { background: #f8d7da; border: 1px solid #d4848a; color: #721c24; }
  .locked .option { cursor: default; }
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    font-size: 1rem;
    color: #3a3a3a;
    font-family: inherit;
  }
  input[type="text"].correct { background: #d4edda; border: 1px solid #7cb987; color: #1e5631; }
  input[type="text"].wrong { background: #f8d7da; border: 1px solid #d4848a; color: #721c24; }
  .solution { margin-top: 12px; font-size: .98rem; color: #1e5631; font-weight: bold; }
  #evaluate {
    background: #5b7e5f;
    color: #fff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    display: block;
    margin: 40px auto 0;
    cursor: pointer;
    font-family: inherit;
  }
  #evaluate:hover { background: #4a6b4e; }
  #evaluate:disabled { background: #b5b5b5; cursor: not-allowed; }
  #warning { text-align: center; color: #721c24; margin-top: 12px; min-height: 1.2em; }
  #result {
    background: #fefcf9;
    border-top: 4px solid #5b7e5f;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    padding: 28px;
    margin-top: 32px;
    display: none;
  }
  #score { font-size: 2.5rem; font-weight: bold; color: #5b7e5f; text-align: center; margin-bottom: 12px; }
  #verdict { font-size: 1rem; color: #4a4a4a; text-align: center; }
  #retry {
    background: #8c7b6b;
    color: #fff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    display: block;
    margin: 24px auto 0;
    cursor: pointer;
    font-family: inherit;
  }
  #retry:hover { background: #756658; }
</style>
</head>
<body>
<div class="wrap">
<h1>Test pro nejchytřejší Čechy. Jestli dáte 10/10, znáte Česko jako svoje boty</h1>
<p class="perex">Titulek slibuje nejchytřejší Čechy a plných deset z deseti. Tady nepomůže školní vlastivěda ani turistický průvodce. Deset otázek o české historii, zeměpisu, hudbě, umění i vědě, u kterých zaváhá i sečtělý znalec.</p>
<div id="quiz"></div>
<button id="evaluate" disabled>Vyhodnotit</button>
<div id="warning"></div>
<div id="result">
  <div id="score"></div>
  <div id="verdict"></div>
  <button id="retry">Zkusit znovu</button>
</div>
</div>
<script>
const questions = [
  { type: `choice`, q: `1. Jak se jmenuje nejvyšší vodopád v České republice?`, options: [`Pančavský vodopád`, `Mumlavský vodopád`, `Vaňovský vodopád`, `vodopády Bílé Opavy`], correct: 0 },
  { type: `choice`, q: `2. Který skladatel zkomponoval operu Její pastorkyňa?`, options: [`Bedřich Smetana`, `Leoš Janáček`, `Antonín Dvořák`, `Bohuslav Martinů`], correct: 1 },
  { type: `choice`, q: `3. Který architekt navrhl brněnskou vilu Tugendhat?`, options: [`Adolf Loos`, `Josef Gočár`, `Ludwig Mies van der Rohe`, `Le Corbusier`], correct: 2 },
  { type: `open`, q: `4. V kterém roce se odehrála bitva u Lipan?`, answers: [`1434`] },
  { type: `choice`, q: `5. Za rozpracování které analytické metody získal Jaroslav Heyrovský Nobelovu cenu za chemii?`, options: [`chromatografie`, `elektroforéza`, `spektrofotometrie`, `polarografie`], correct: 3 },
  { type: `choice`, q: `6. Kdo je autorem pomníku mistra Jana Husa na Staroměstském náměstí v Praze?`, options: [`Ladislav Šaloun`, `Stanislav Sucharda`, `Jan Štursa`, `František Bílek`], correct: 0 },
  { type: `choice`, q: `7. Které je nejvýše položené město České republiky?`, options: [`Pec pod Sněžkou`, `Boží Dar`, `Železná Ruda`, `Harrachov`], correct: 1 },
  { type: `choice`, q: `8. Který jihočeský rybníkář vybudoval rybník Rožmberk?`, options: [`Štěpánek Netolický`, `Mikuláš Ruthard z Malešova`, `Jakub Krčín`, `Josef Rosenauer`], correct: 2 },
  { type: `choice`, q: `9. Kdo je autorem básnické sbírky Slezské písně?`, options: [`Fráňa Šrámek`, `Otokar Březina`, `Karel Toman`, `Petr Bezruč`], correct: 3 },
  { type: `open`, q: `10. V kterém roce se odehrála bitva na Moravském poli?`, answers: [`1278`] }
];

const ranges = [
  { min: 0, max: 3, text: `Česko znáte tak, jak ho zná běžný kolemjdoucí. Základní obrys ano, ale jakmile přijde na méně otřepané jméno, letopočet nebo místo, tápete. Do party nejchytřejších to zatím není a k tomu, abyste znali zemi jako svoje boty, chybí pořádný kus.` },
  { min: 4, max: 6, text: `Solidní průměr přemýšlivého Čecha. Hlavní kapitoly historie, zeměpisu i kultury máte v malíku, ale specialista z vás ještě není. Svoje boty znáte líp než tenhle test, na titul z titulku to ale nestačí.` },
  { min: 7, max: 9, text: `Výborně. Patříte mezi opravdové znalce, kterým česká historie, hudba, umění i příroda nedělají potíže ani mimo hlavní proud. Jen pár detailů vám uteklo a od nejchytřejších vás dělí jediný krok.` },
  { min: 10, max: 10, text: `Naprostá špička. Dali jste plný počet u testu, který měl srazit i sečtělé znalce. Česko opravdu znáte jako svoje boty, od krkonošských vodopádů přes rybníkáře až po letopočty, které většina lidí dávno zapomněla. Klobouk dolů.` }
];

const answers = new Array(questions.length).fill(null);
let locked = false;

const quizEl = document.getElementById(`quiz`);
const evalBtn = document.getElementById(`evaluate`);
const warning = document.getElementById(`warning`);
const resultEl = document.getElementById(`result`);

function norm(s) {
  return s.toLowerCase().normalize(`NFD`).replace(/[̀-ͯ]/g, ``).replace(/\s+/g, ` `).trim();
}

function render() {
  quizEl.innerHTML = ``;
  questions.forEach((item, qi) => {
    const box = document.createElement(`div`);
    box.className = `question`;
    const qt = document.createElement(`div`);
    qt.className = `q-text`;
    qt.textContent = item.q;
    box.appendChild(qt);
    if (item.type === `choice`) {
      item.options.forEach((opt, oi) => {
        const btn = document.createElement(`button`);
        btn.className = `option`;
        btn.textContent = opt;
        btn.addEventListener(`click`, () => {
          if (locked) return;
          answers[qi] = oi;
          Array.from(box.querySelectorAll(`.option`)).forEach(b => b.classList.remove(`selected`));
          btn.classList.add(`selected`);
          updateEval();
        });
        box.appendChild(btn);
      });
    } else {
      const inp = document.createElement(`input`);
      inp.type = `text`;
      inp.addEventListener(`input`, () => {
        if (locked) return;
        answers[qi] = inp.value.trim() === `` ? null : inp.value;
        updateEval();
      });
      box.appendChild(inp);
    }
    quizEl.appendChild(box);
  });
}

function allAnswered() {
  return answers.every(a => a !== null && a !== ``);
}

function updateEval() {
  evalBtn.disabled = !allAnswered();
  if (allAnswered()) warning.textContent = ``;
}

evalBtn.addEventListener(`click`, () => {
  if (!allAnswered()) {
    warning.textContent = `Odpovězte prosím na všechny otázky`;
    return;
  }
  locked = true;
  let score = 0;
  const boxes = quizEl.querySelectorAll(`.question`);
  questions.forEach((item, qi) => {
    const box = boxes[qi];
    box.classList.add(`locked`);
    if (item.type === `choice`) {
      const opts = box.querySelectorAll(`.option`);
      const chosen = answers[qi];
      if (chosen === item.correct) score++;
      opts.forEach((b, oi) => {
        b.classList.remove(`selected`);
        if (oi === item.correct) b.classList.add(`correct`);
        else if (oi === chosen) b.classList.add(`wrong`);
      });
    } else {
      const inp = box.querySelector(`input`);
      inp.disabled = true;
      const ok = item.answers.some(a => norm(a) === norm(String(answers[qi])));
      if (ok) { score++; inp.classList.add(`correct`); }
      else {
        inp.classList.add(`wrong`);
        const sol = document.createElement(`div`);
        sol.className = `solution`;
        sol.textContent = `Správná odpověď: ` + item.answers[0];
        box.appendChild(sol);
      }
    }
  });
  document.getElementById(`score`).textContent = score + ` z ` + questions.length;
  const r = ranges.find(x => score >= x.min && score <= x.max);
  document.getElementById(`verdict`).textContent = r ? r.text : ``;
  evalBtn.style.display = `none`;
  resultEl.style.display = `block`;
  resultEl.scrollIntoView({ behavior: `smooth` });
});

document.getElementById(`retry`).addEventListener(`click`, () => {
  locked = false;
  answers.fill(null);
  resultEl.style.display = `none`;
  evalBtn.style.display = `block`;
  evalBtn.disabled = true;
  warning.textContent = ``;
  render();
  window.scrollTo({ top: 0, behavior: `smooth` });
});

render();
</script>
</body>
</html>
