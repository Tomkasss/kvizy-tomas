<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Těžký test o České republice</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    line-height: 1.6;
    padding: 40px 16px 80px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.9rem;
    line-height: 1.3;
    color: #2c2c2c;
    margin: 0 0 20px;
  }
  .perex {
    font-size: 1.1rem;
    color: #4a4a4a;
    margin: 0 0 36px;
  }
  .question {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .question-text {
    font-weight: bold;
    font-size: 1.15rem;
    color: #2c2c2c;
    margin: 0 0 18px;
  }
  .option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    color: #3a3a3a;
    font-family: inherit;
    margin-bottom: 12px;
    transition: background 0.15s ease;
  }
  .option:last-child { margin-bottom: 0; }
  .option:hover:not(.locked) { background: #ede8e1; }
  .option.selected {
    background: #dcd3c7;
    border: 1px solid #a89e92;
    font-weight: bold;
  }
  .option.locked { cursor: default; }
  .option.correct {
    background: #d4edda;
    border: 1px solid #7cb987;
    color: #1e5631;
  }
  .option.wrong {
    background: #f8d7da;
    border: 1px solid #d4848a;
    color: #721c24;
  }
  .correct-answer {
    margin-top: 14px;
    font-size: 0.98rem;
    color: #1e5631;
  }
  .btn-evaluate {
    background: #5b7e5f;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: inherit;
    transition: background 0.15s ease;
  }
  .btn-evaluate:hover:not(:disabled) { background: #4a6b4e; }
  .btn-evaluate:disabled {
    background: #b5b5b5;
    cursor: not-allowed;
  }
  .result {
    background: #fefcf9;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-top: 4px solid #5b7e5f;
    padding: 28px;
    margin-top: 32px;
  }
  .score {
    font-size: 2.5rem;
    font-weight: bold;
    color: #5b7e5f;
    text-align: center;
    margin: 0 0 12px;
  }
  .verdict {
    font-size: 1rem;
    color: #4a4a4a;
    text-align: center;
    margin: 0;
  }
  .btn-retry {
    background: #8c7b6b;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: inherit;
    transition: background 0.15s ease;
  }
  .btn-retry:hover { background: #756658; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: #2c2c2c;
    color: #ffffff;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 1rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .hidden { display: none; }
  @media (max-width: 600px) {
    h1 { font-size: 1.5rem; }
    .question { padding: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1></h1>
  <p class="perex"></p>
  <div id="quiz"></div>
  <button id="evaluateBtn" class="btn-evaluate" disabled>Vyhodnotit</button>
  <div id="result" class="result hidden">
    <div class="score" id="score"></div>
    <p class="verdict" id="verdict"></p>
    <button id="retryBtn" class="btn-retry">Zkusit znovu</button>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
(function () {
  const H1_TEXT = `Těžký test o České republice: spousta Čechů si na něm vyláme zuby a nedají ani 7/10`;
  const PEREX_TEXT = `Nejvýše položené město, nejstarší lázně, první tuzemský Oscar i nejdelší jeskyně pod povrchem. Deset otázek o Česku, u kterých si většina lidí vyláme zuby. Kdo dá aspoň sedm, patří mezi opravdové znalce téhle země.`;

  const QUESTIONS = [
    {
      q: `Se kterým pražským rabínem je spjata pověst o Golemovi?`,
      options: [`Jehuda Löw`, `Ezechiel Landau`, `Mordechaj Maisel`, `Salomon Molcho`],
      correct: 0
    },
    {
      q: `Které je nejvýše položené město v České republice?`,
      options: [`Pec pod Sněžkou`, `Železná Ruda`, `Boží Dar`, `Harrachov`],
      correct: 2
    },
    {
      q: `Který železniční tunel je nejdelší v České republice?`,
      options: [`Špičácký tunel`, `Ejpovický tunel`, `Březenský tunel`, `Vinohradský tunel`],
      correct: 1
    },
    {
      q: `Které město má nejstarší zoologickou zahradu v České republice?`,
      options: [`Praha`, `Dvůr Králové`, `Liberec`, `Plzeň`],
      correct: 2
    },
    {
      q: `Který most je nejstarší dochovaný na území České republiky?`,
      options: [`Kamenný most v Písku`, `Karlův most v Praze`, `Svatojánský most v Litovli`, `Negrelliho viadukt v Praze`],
      correct: 0
    },
    {
      q: `Která budova je nejvyšší v České republice?`,
      options: [`City Tower v Praze`, `City Empiria v Praze`, `Corinthia Hotel v Praze`, `AZ Tower v Brně`],
      correct: 3
    },
    {
      q: `Který film jako první získal filmového Oscara pro Československo?`,
      options: [`Ostře sledované vlaky`, `Kolja`, `Obchod na korze`, `Lásky jedné plavovlásky`],
      correct: 2
    },
    {
      q: `Kolik zlatých olympijských medailí získala Věra Čáslavská?`,
      options: [`5`, `7`, `9`, `11`],
      correct: 1
    },
    {
      q: `Které město má nejstarší lázně v České republice?`,
      options: [`Teplice`, `Karlovy Vary`, `Františkovy Lázně`, `Luhačovice`],
      correct: 0
    },
    {
      q: `Který jeskynní systém je nejdelší v České republice?`,
      options: [`Koněpruské jeskyně`, `Javoříčské jeskyně`, `Bozkovské dolomitové jeskyně`, `Amatérská jeskyně`],
      correct: 3
    }
  ];

  const VERDICTS = [
    { min: 0, max: 3, text: `Tady to zaskřípalo. Základní obrysy republiky držíte, ale u těžších faktů jste narazili. Nevadí, právě takové rekordy a prvenství se v učebnicích schovávají malým písmem. Pár výletů a čtení navíc a příště to bude jinak.` },
    { min: 4, max: 6, text: `Slušný průměr. Zorientovali jste se v tom, co ví běžný Čech, ale u opravdových chytáků jistota povolila. Patříte k většině, která svou zem zná, jen se do detailů nikdy nepouštěla.` },
    { min: 7, max: 9, text: `Tohle už je výkon znalce. Nejvýše položené město, první Oscar i nejdelší tunel vám nedělají problém a o své zemi víte podstatně víc než okolí. Na plný počet chyběla jedna dvě drobnosti.` },
    { min: 10, max: 10, text: `Naprostá bezchybnost. Znáte rekordy, prvenství i kuriozity, které většina lidí mine bez povšimnutí. Českou republiku máte v malíku a na tenhle test si zuby rozhodně nevylámete.` }
  ];

  const answers = new Array(QUESTIONS.length).fill(null);
  let evaluated = false;
  let toastTimer = null;

  const quizEl = document.getElementById(`quiz`);
  const evaluateBtn = document.getElementById(`evaluateBtn`);
  const resultEl = document.getElementById(`result`);
  const scoreEl = document.getElementById(`score`);
  const verdictEl = document.getElementById(`verdict`);
  const retryBtn = document.getElementById(`retryBtn`);
  const toastEl = document.getElementById(`toast`);

  document.querySelector(`h1`).textContent = H1_TEXT;
  document.querySelector(`.perex`).textContent = PEREX_TEXT;

  const letters = [`a`, `b`, `c`, `d`];

  function buildQuiz() {
    quizEl.innerHTML = ``;
    QUESTIONS.forEach(function (item, qIndex) {
      const box = document.createElement(`div`);
      box.className = `question`;

      const qText = document.createElement(`div`);
      qText.className = `question-text`;
      qText.textContent = (qIndex + 1) + `. ` + item.q;
      box.appendChild(qText);

      item.options.forEach(function (opt, oIndex) {
        const btn = document.createElement(`button`);
        btn.className = `option`;
        btn.type = `button`;
        btn.textContent = letters[oIndex] + `) ` + opt;
        btn.setAttribute(`data-q`, qIndex);
        btn.setAttribute(`data-o`, oIndex);
        btn.addEventListener(`click`, onOptionClick);
        box.appendChild(btn);
      });

      quizEl.appendChild(box);
    });
  }

  function onOptionClick(e) {
    if (evaluated) return;
    const btn = e.currentTarget;
    const qIndex = parseInt(btn.getAttribute(`data-q`), 10);
    const oIndex = parseInt(btn.getAttribute(`data-o`), 10);

    answers[qIndex] = oIndex;

    const siblings = btn.parentNode.querySelectorAll(`.option`);
    siblings.forEach(function (s) { s.classList.remove(`selected`); });
    btn.classList.add(`selected`);

    updateEvaluateState();
  }

  function updateEvaluateState() {
    const allAnswered = answers.every(function (a) { return a !== null; });
    evaluateBtn.disabled = !allAnswered;
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add(`show`);
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastEl.classList.remove(`show`);
    }, 2800);
  }

  function evaluate() {
    const allAnswered = answers.every(function (a) { return a !== null; });
    if (!allAnswered) {
      showToast(`Odpovězte prosím na všechny otázky`);
      return;
    }

    evaluated = true;
    let score = 0;

    const boxes = quizEl.querySelectorAll(`.question`);
    boxes.forEach(function (box, qIndex) {
      const opts = box.querySelectorAll(`.option`);
      const correctIndex = QUESTIONS[qIndex].correct;
      const chosen = answers[qIndex];

      opts.forEach(function (opt, oIndex) {
        opt.classList.add(`locked`);
        opt.classList.remove(`selected`);
        if (oIndex === correctIndex) {
          opt.classList.add(`correct`);
        } else if (oIndex === chosen) {
          opt.classList.add(`wrong`);
        }
      });

      if (chosen === correctIndex) {
        score++;
      } else {
        const reveal = document.createElement(`div`);
        reveal.className = `correct-answer`;
        reveal.textContent = `Správná odpověď: ` + letters[correctIndex] + `) ` + QUESTIONS[qIndex].options[correctIndex];
        box.appendChild(reveal);
      }
    });

    evaluateBtn.classList.add(`hidden`);

    scoreEl.textContent = score + ` z ` + QUESTIONS.length;
    verdictEl.textContent = getVerdict(score);
    resultEl.classList.remove(`hidden`);

    resultEl.scrollIntoView({ behavior: `smooth`, block: `start` });
  }

  function getVerdict(score) {
    for (let i = 0; i < VERDICTS.length; i++) {
      if (score >= VERDICTS[i].min && score <= VERDICTS[i].max) {
        return VERDICTS[i].text;
      }
    }
    return ``;
  }

  function reset() {
    evaluated = false;
    for (let i = 0; i < answers.length; i++) answers[i] = null;
    buildQuiz();
    evaluateBtn.classList.remove(`hidden`);
    evaluateBtn.disabled = true;
    resultEl.classList.add(`hidden`);
    window.scrollTo({ top: 0, behavior: `smooth` });
  }

  evaluateBtn.addEventListener(`click`, evaluate);
  retryBtn.addEventListener(`click`, reset);

  buildQuiz();
})();
</script>
</body>
</html>
