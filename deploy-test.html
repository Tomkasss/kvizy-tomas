<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz biologie ze ZŠ: kdo ho nedá aspoň na 3, měl by se vrátit do lavice 9. třídy</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: "Georgia", "Times New Roman", serif;
  background: #f5f0eb;
  color: #2c2c2c;
  margin: 0;
  padding: 40px 16px;
  line-height: 1.6;
}
.container {
  max-width: 720px;
  margin: 0 auto;
}
h1 {
  font-size: 1.8rem;
  margin: 0 0 20px 0;
  color: #2c2c2c;
  line-height: 1.3;
}
.perex {
  font-size: 1.05rem;
  color: #4a4a4a;
  margin-bottom: 32px;
  font-style: italic;
}
.question {
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 28px;
  margin-bottom: 24px;
}
.question-text {
  font-weight: bold;
  font-size: 1.15rem;
  color: #2c2c2c;
  margin-bottom: 18px;
}
.option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  background: #f7f4f0;
  border: 1px solid #d9d2c9;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  color: #3a3a3a;
  font-family: inherit;
  margin-bottom: 10px;
  transition: background 0.15s, border-color 0.15s;
}
.option:last-child { margin-bottom: 0; }
.option:hover:not(:disabled) { background: #ede8e1; }
.option.selected {
  background: #dcd3c7;
  border: 1px solid #a89e92;
  font-weight: bold;
}
.option.correct {
  background: #d4edda;
  border: 1px solid #7cb987;
  color: #1e5631;
}
.option.incorrect {
  background: #f8d7da;
  border: 1px solid #d4848a;
  color: #721c24;
}
.option:disabled { cursor: default; }
#evaluate-btn {
  display: block;
  margin: 40px auto 0;
  background: #5b7e5f;
  color: #ffffff;
  padding: 16px 40px;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: bold;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
#evaluate-btn:hover:not(:disabled) { background: #4a6b4e; }
#evaluate-btn:disabled {
  background: #b5b5b5;
  cursor: not-allowed;
}
#result {
  display: none;
  background: #fefcf9;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border-top: 4px solid #5b7e5f;
  padding: 28px;
  margin-top: 32px;
  text-align: center;
}
.score {
  font-size: 2.5rem;
  font-weight: bold;
  color: #5b7e5f;
  margin-bottom: 12px;
}
.eval-text {
  font-size: 1rem;
  color: #4a4a4a;
  margin-bottom: 20px;
}
#retry-btn {
  display: block;
  margin: 24px auto 0;
  background: #8c7b6b;
  color: #ffffff;
  padding: 16px 40px;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: bold;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
#retry-btn:hover { background: #756658; }
@media (max-width: 600px) {
  body { padding: 20px 16px; }
  h1 { font-size: 1.5rem; }
  .question { padding: 20px; }
}
</style>
</head>
<body>
<div class="container">
<h1>Kvíz biologie ze ZŠ: kdo ho nedá aspoň na 3, měl by se vrátit do lavice 9. třídy</h1>
<p class="perex">Obratle, dýchání, jedovaté bobule i dědičnost. Deset otázek z biologie, které by měl zvládnout každý, kdo prošel devátou třídou. Kdo netrefí aspoň tři správně, zasloužil by si návrat do školní lavice.</p>
<div id="quiz"></div>
<button id="evaluate-btn" disabled>Vyhodnotit</button>
<div id="result">
  <div class="score" id="score-text"></div>
  <div class="eval-text" id="eval-text"></div>
  <button id="retry-btn">Zkusit znovu</button>
</div>
</div>
<script>
const questions = [
  {
    q: `1. Kolik obratlů má lidská páteř?`,
    options: [`33 až 34`, `24 až 25`, `26 až 28`, `40 až 42`],
    correct: 0
  },
  {
    q: `2. Jak se v lidském těle nazývá útvar, který spojuje sval s kostí?`,
    options: [`Vaz`, `Chrupavka`, `Šlacha`, `Meniskus`],
    correct: 2
  },
  {
    q: `3. Jak se jmenuje základní stavební a funkční jednotka ledvin?`,
    options: [`Neuron`, `Dendrit`, `Lymfocyt`, `Nefron`],
    correct: 3
  },
  {
    q: `4. Jak se jmenuje sval, který odděluje hrudní dutinu od dutiny břišní a hraje hlavní roli při dýchání?`,
    options: [`Mezižeberní sval`, `Bránice`, `Přímý sval břišní`, `Srdeční sval`],
    correct: 1
  },
  {
    q: `5. Jak se v genetice nazývá základní jednotka dědičnosti, tvořená úsekem DNA?`,
    options: [`Gen`, `Chromozom`, `Alela`, `Nukleotid`],
    correct: 0
  },
  {
    q: `6. Kolik laloků má pravá plíce člověka?`,
    options: [`1`, `3`, `2`, `4`],
    correct: 1
  },
  {
    q: `7. Jak se jmenuje nejdelší nerv v lidském těle?`,
    options: [`Bloudivý nerv`, `Trojklaný nerv`, `Sedací nerv`, `Zrakový nerv`],
    correct: 2
  },
  {
    q: `8. V jakém orgánu se v lidském těle tvoří žluč?`,
    options: [`Žlučník`, `Žaludek`, `Slinivka břišní`, `Játra`],
    correct: 3
  },
  {
    q: `9. Která z následujících jedovatých rostlin způsobuje v České republice nejvíce vážných otrav?`,
    options: [`Rulík zlomocný`, `Náprstník červený`, `Konvalinka vonná`, `Durman obecný`],
    correct: 0
  },
  {
    q: `10. Jak dlouho přibližně žije v lidském těle jedna červená krvinka, než zanikne a je nahrazena novou?`,
    options: [`30 dní`, `120 dní`, `1 rok`, `10 let`],
    correct: 1
  }
];

const evalRanges = [
  { min: 0, max: 3, text: `Biologii jste v deváté třídě nejspíš proseděli u okna. Učebnice přírodopisu volá po reparátu, klidně hned.` },
  { min: 4, max: 6, text: `Základní přehled držíte, ale některé věci vám v hlavě už dávno zarostly plevelem. Na pořádnou devítku to ještě není.` },
  { min: 7, max: 9, text: `Slušný výsledek absolventa základky, který v hodinách biologie nezahálel. Zbylé drobnosti si doplníte za pár minut v atlasu.` },
  { min: 10, max: 10, text: `Biologický přebor. Pokud nejste lékař, biolog nebo aspoň veterinář, jste ve špatné branži.` }
];

const answers = new Array(questions.length).fill(null);
let evaluated = false;

const quizEl = document.getElementById(`quiz`);
const evalBtn = document.getElementById(`evaluate-btn`);
const resultEl = document.getElementById(`result`);
const scoreEl = document.getElementById(`score-text`);
const evalTextEl = document.getElementById(`eval-text`);
const retryBtn = document.getElementById(`retry-btn`);

function renderQuiz() {
  quizEl.innerHTML = ``;
  questions.forEach((question, qIdx) => {
    const box = document.createElement(`div`);
    box.className = `question`;
    const qText = document.createElement(`div`);
    qText.className = `question-text`;
    qText.textContent = question.q;
    box.appendChild(qText);
    question.options.forEach((opt, oIdx) => {
      const btn = document.createElement(`button`);
      btn.className = `option`;
      btn.type = `button`;
      const letter = String.fromCharCode(97 + oIdx);
      btn.textContent = `${letter}) ${opt}`;
      btn.dataset.qIdx = qIdx;
      btn.dataset.oIdx = oIdx;
      btn.addEventListener(`click`, handleOptionClick);
      box.appendChild(btn);
    });
    quizEl.appendChild(box);
  });
}

function handleOptionClick(event) {
  if (evaluated) return;
  const btn = event.currentTarget;
  const qIdx = parseInt(btn.dataset.qIdx, 10);
  const oIdx = parseInt(btn.dataset.oIdx, 10);
  answers[qIdx] = oIdx;
  const box = btn.parentElement;
  box.querySelectorAll(`.option`).forEach(b => b.classList.remove(`selected`));
  btn.classList.add(`selected`);
  updateEvalButton();
}

function updateEvalButton() {
  const allAnswered = answers.every(a => a !== null);
  evalBtn.disabled = !allAnswered;
}

function evaluate() {
  if (answers.some(a => a === null)) {
    alert(`Odpovězte prosím na všechny otázky`);
    return;
  }
  evaluated = true;
  let score = 0;
  const boxes = quizEl.querySelectorAll(`.question`);
  boxes.forEach((box, qIdx) => {
    const opts = box.querySelectorAll(`.option`);
    const correctIdx = questions[qIdx].correct;
    const userIdx = answers[qIdx];
    opts.forEach((opt, oIdx) => {
      opt.disabled = true;
      opt.classList.remove(`selected`);
      if (oIdx === correctIdx) {
        opt.classList.add(`correct`);
      } else if (oIdx === userIdx) {
        opt.classList.add(`incorrect`);
      }
    });
    if (userIdx === correctIdx) score++;
  });
  scoreEl.textContent = `${score} z ${questions.length}`;
  const range = evalRanges.find(r => score >= r.min && score <= r.max);
  evalTextEl.textContent = range ? range.text : ``;
  evalBtn.style.display = `none`;
  resultEl.style.display = `block`;
  resultEl.scrollIntoView({ behavior: `smooth`, block: `start` });
}

function reset() {
  evaluated = false;
  for (let i = 0; i < answers.length; i++) answers[i] = null;
  renderQuiz();
  evalBtn.disabled = true;
  evalBtn.style.display = `block`;
  resultEl.style.display = `none`;
  window.scrollTo({ top: 0, behavior: `smooth` });
}

evalBtn.addEventListener(`click`, evaluate);
retryBtn.addEventListener(`click`, reset);

renderQuiz();
</script>
</body>
</html>
