<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ test na čas</title>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    margin: 0;
    padding: 40px 16px;
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 2rem;
    line-height: 1.3;
    color: #2c2c2c;
    margin: 0 0 18px;
  }
  .perex {
    font-size: 1.1rem;
    color: #4a4a4a;
    margin: 0 0 36px;
  }
  .question {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .q-text {
    font-weight: bold;
    font-size: 1.15rem;
    color: #2c2c2c;
    margin-bottom: 18px;
  }
  .answer-input {
    width: 100%;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    color: #3a3a3a;
  }
  .answer-input:focus {
    outline: none;
    border-color: #a89e92;
    background: #ffffff;
  }
  .answer-input:disabled { cursor: not-allowed; }
  .answer-input.correct {
    background: #d4edda;
    border: 1px solid #7cb987;
    color: #1e5631;
    font-weight: bold;
  }
  .answer-input.incorrect {
    background: #f8d7da;
    border: 1px solid #d4848a;
    color: #721c24;
    font-weight: bold;
  }
  .correct-reveal {
    margin-top: 12px;
    font-size: 0.98rem;
    color: #1e5631;
  }
  .correct-reveal strong { color: #1e5631; }
  #evaluate {
    background: #5b7e5f;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: inherit;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
  }
  #evaluate:hover:not(:disabled) { background: #4a6b4e; }
  #evaluate:disabled { background: #b5b5b5; cursor: not-allowed; }
  .result {
    background: #fefcf9;
    border-top: 4px solid #5b7e5f;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-top: 32px;
  }
  .score {
    font-size: 2.5rem;
    font-weight: bold;
    color: #5b7e5f;
    text-align: center;
    margin: 0 0 12px;
  }
  .verdict {
    font-size: 1rem;
    color: #4a4a4a;
    text-align: center;
    margin: 0;
  }
  #retry {
    background: #8c7b6b;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: inherit;
    border: none;
    cursor: pointer;
    display: block;
    margin: 24px auto 0;
  }
  #retry:hover { background: #756658; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: #2c2c2c;
    color: #fff;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    body { padding: 24px 16px; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="quiz-title"></h1>
  <p class="perex" id="quiz-perex"></p>
  <div id="questions"></div>
  <button id="evaluate" disabled></button>
  <div id="result-area"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  const title = `IQ test na čas: Dokážete správně zodpovědět všech 10 otázek během 5 minut?`;
  const perex = `Deset úloh na logiku, počítání zpaměti a postřeh. Stopky běží a na všechno máte pět minut. Kdo zvládne odpovědět správně na všech deset, má hlavu, která pracuje rychle i přesně.`;

  const questions = [
    {
      text: `Jaké číslo logicky pokračuje v řadě: 2, 6, 12, 20, 30, ?`,
      display: `42`,
      accepted: [`42`, `čtyřicet dva`]
    },
    {
      text: `Kolik je čtyřicet děleno jednou polovinou?`,
      display: `80`,
      accepted: [`80`, `osmdesát`]
    },
    {
      text: `Kolik dělitelů má číslo 24?`,
      display: `8`,
      accepted: [`8`, `osm`]
    },
    {
      text: `Kolik je součet prvních deseti lichých čísel?`,
      display: `100`,
      accepted: [`100`, `sto`]
    },
    {
      text: `Kolika různými způsoby lze uspořádat písmena ve jméně ANNA?`,
      display: `6`,
      accepted: [`6`, `šest`]
    },
    {
      text: `Kolik let bude Petrově sestře, která je dnes dvakrát starší než osmiletý Petr, až bude Petrovi šestnáct?`,
      display: `24`,
      accepted: [`24`, `dvacet čtyři`]
    },
    {
      text: `Který součet padne s největší pravděpodobností při hodu dvěma hracími kostkami?`,
      display: `7`,
      accepted: [`7`, `sedm`]
    },
    {
      text: `Kolik nejméně vážení na rovnoramenných vahách potřebujete, abyste mezi devíti stejně vypadajícími mincemi našli jedinou lehčí falešnou?`,
      display: `2`,
      accepted: [`2`, `dva`, `dvě`]
    },
    {
      text: `Které písmeno logicky pokračuje v řadě: J, D, T, Č, P, Š, S, ?`,
      display: `O`,
      accepted: [`o`, `osm`]
    },
    {
      text: `Které číslo jsem si myslel, když po odečtení jeho poloviny a přičtení pěti vyjde dvacet?`,
      display: `30`,
      accepted: [`30`, `třicet`]
    }
  ];

  const tiers = [
    { min: 0, max: 3, text: `Čas vás dnes přemohl. Většina těchhle úloh nespoléhá na vědomosti, ale na to, jestli se dokážete zastavit dřív, než vyletí první odpověď. Právě spěch je tady největší past. Zkuste to znovu bez stopek a uvidíte, kolik jich najednou zvládnete.` },
    { min: 4, max: 6, text: `Přesně střed pole. Přímočaré úlohy jste zvládli hravě, ale u těch, kde bylo potřeba prohlédnout fintu, vás tlak času dostal. Slušný výkon, na kterém se dá stavět. Ještě přidat klid a body přibudou samy.` },
    { min: 7, max: 9, text: `Hlava vám šlape rychle i pod tlakem. Rozpoznáváte vzorce, počítáte zpaměti a nenecháte se strhnout k unáhlené odpovědi. Do plného počtu vás dělí jediné klopýtnutí na detailu, ne způsob myšlení.` },
    { min: 10, max: 10, text: `Deset z deseti během pěti minut. Rychlost, přesnost i odolnost vůči nachytání pohromadě. Tohle za časový limit zvládne jen zlomek lidí. Klobouk dolů.` }
  ];

  const titleEl = document.getElementById(`quiz-title`);
  const perexEl = document.getElementById(`quiz-perex`);
  const questionsEl = document.getElementById(`questions`);
  const evaluateBtn = document.getElementById(`evaluate`);
  const resultArea = document.getElementById(`result-area`);
  const toastEl = document.getElementById(`toast`);

  titleEl.textContent = title;
  perexEl.textContent = perex;
  evaluateBtn.textContent = `Vyhodnotit`;

  let evaluated = false;
  let toastTimer = null;

  function normalize(str) {
    return str
      .toLowerCase()
      .normalize(`NFD`)
      .replace(/[\u0300-\u036f]/g, ``)
      .replace(/[.,;!?]/g, ``)
      .replace(/\s+/g, ``)
      .trim();
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add(`show`);
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastEl.classList.remove(`show`);
    }, 2600);
  }

  function buildQuiz() {
    evaluated = false;
    resultArea.innerHTML = ``;
    questionsEl.innerHTML = ``;

    questions.forEach(function (q, i) {
      const box = document.createElement(`div`);
      box.className = `question`;

      const qText = document.createElement(`div`);
      qText.className = `q-text`;
      qText.textContent = (i + 1) + `. ` + q.text;
      box.appendChild(qText);

      const input = document.createElement(`input`);
      input.type = `text`;
      input.className = `answer-input`;
      input.setAttribute(`aria-label`, `Odpověď na otázku ` + (i + 1));
      input.setAttribute(`autocomplete`, `off`);
      input.dataset.index = i;
      input.addEventListener(`input`, updateEvaluateState);
      box.appendChild(input);

      questionsEl.appendChild(box);
    });

    evaluateBtn.disabled = true;
    updateEvaluateState();
  }

  function allAnswered() {
    const inputs = questionsEl.querySelectorAll(`.answer-input`);
    for (let i = 0; i < inputs.length; i++) {
      if (inputs[i].value.trim() === ``) return false;
    }
    return true;
  }

  function updateEvaluateState() {
    if (evaluated) return;
    evaluateBtn.disabled = !allAnswered();
  }

  function evaluate() {
    if (evaluated) return;
    if (!allAnswered()) {
      showToast(`Odpovězte prosím na všechny otázky`);
      return;
    }

    evaluated = true;
    let score = 0;
    const inputs = questionsEl.querySelectorAll(`.answer-input`);

    inputs.forEach(function (input, i) {
      input.disabled = true;
      const userNorm = normalize(input.value);
      const isCorrect = questions[i].accepted.some(function (a) {
        return normalize(a) === userNorm;
      });

      if (isCorrect) {
        input.classList.add(`correct`);
        score++;
      } else {
        input.classList.add(`incorrect`);
        const reveal = document.createElement(`div`);
        reveal.className = `correct-reveal`;
        const label = document.createElement(`span`);
        label.textContent = `Správná odpověď: `;
        const val = document.createElement(`strong`);
        val.textContent = questions[i].display;
        reveal.appendChild(label);
        reveal.appendChild(val);
        input.parentNode.appendChild(reveal);
      }
    });

    evaluateBtn.disabled = true;
    showResult(score);
  }

  function showResult(score) {
    let verdict = ``;
    for (let i = 0; i < tiers.length; i++) {
      if (score >= tiers[i].min && score <= tiers[i].max) {
        verdict = tiers[i].text;
        break;
      }
    }

    const result = document.createElement(`div`);
    result.className = `result`;

    const scoreEl = document.createElement(`div`);
    scoreEl.className = `score`;
    scoreEl.textContent = score + ` z ` + questions.length;
    result.appendChild(scoreEl);

    const verdictEl = document.createElement(`p`);
    verdictEl.className = `verdict`;
    verdictEl.textContent = verdict;
    result.appendChild(verdictEl);

    const retryBtn = document.createElement(`button`);
    retryBtn.id = `retry`;
    retryBtn.textContent = `Zkusit znovu`;
    retryBtn.addEventListener(`click`, reset);
    result.appendChild(retryBtn);

    resultArea.appendChild(result);
    result.scrollIntoView({ behavior: `smooth`, block: `start` });
  }

  function reset() {
    buildQuiz();
    window.scrollTo({ top: 0, behavior: `smooth` });
  }

  evaluateBtn.addEventListener(`click`, evaluate);
  buildQuiz();
})();
</script>
</body>
</html>
