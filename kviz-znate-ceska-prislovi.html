<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz: znáte česká přísloví?</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
  }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    line-height: 1.6;
    padding: 40px 16px;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.9rem;
    line-height: 1.3;
    color: #2c2c2c;
    margin: 0 0 18px;
  }
  .perex {
    font-size: 1.1rem;
    color: #4a4a4a;
    margin: 0 0 32px;
  }
  .question {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .q-text {
    font-weight: bold;
    font-size: 1.15rem;
    color: #2c2c2c;
    margin: 0 0 18px;
  }
  .option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    color: #3a3a3a;
    margin-bottom: 12px;
    transition: background 0.15s ease;
  }
  .option:last-child { margin-bottom: 0; }
  .option:hover { background: #ede8e1; }
  .option:focus-visible {
    outline: 2px solid #5b7e5f;
    outline-offset: 2px;
  }
  .option.selected {
    background: #dcd3c7;
    border: 1px solid #a89e92;
    font-weight: bold;
  }
  .option.correct {
    background: #d4edda;
    border: 1px solid #7cb987;
    color: #1e5631;
  }
  .option.wrong {
    background: #f8d7da;
    border: 1px solid #d4848a;
    color: #721c24;
  }
  .locked .option { cursor: default; }
  .locked .option:hover { background: #f7f4f0; }
  .locked .option.selected:hover { background: #dcd3c7; }
  .locked .option.correct:hover { background: #d4edda; }
  .locked .option.wrong:hover { background: #f8d7da; }
  .reveal {
    margin-top: 14px;
    font-size: 1rem;
    color: #1e5631;
    font-weight: bold;
  }
  .btn {
    display: block;
    margin: 40px auto 0;
    padding: 16px 40px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: bold;
    color: #ffffff;
    cursor: pointer;
    background: #5b7e5f;
    transition: background 0.15s ease;
  }
  .btn:hover { background: #4a6b4e; }
  .btn:disabled {
    background: #b5b5b5;
    cursor: not-allowed;
  }
  .btn-retry {
    background: #8c7b6b;
  }
  .btn-retry:hover { background: #756658; }
  .result {
    background: #fefcf9;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-top: 4px solid #5b7e5f;
    padding: 28px;
    margin-top: 40px;
    text-align: center;
  }
  .score {
    font-size: 2.5rem;
    font-weight: bold;
    color: #5b7e5f;
    margin: 0 0 12px;
  }
  .verdict {
    font-size: 1rem;
    color: #4a4a4a;
    margin: 0;
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: #2c2c2c;
    color: #fff;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (max-width: 600px) {
    body { padding: 24px 16px; }
    h1 { font-size: 1.55rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="quiz-title"></h1>
  <p class="perex" id="quiz-perex"></p>
  <div id="questions"></div>
  <button class="btn" id="evaluate-btn" disabled>Vyhodnotit</button>
  <div id="result-area"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  const title = `Kvíz: znáte česká přísloví? Kdo doplní všech 10, patří mezi opravdové znalce`;
  const perex = `Přísloví patřila k výbavě našich prarodičů, dnes je málokdo doplní bez zaváhání. Některá znějí povědomě, jiná potrápí. Doplníte správně všech deset? Kdo to dokáže, patří mezi opravdové znalce lidové moudrosti.`;

  const questions = [
    {
      q: `Doplňte přísloví: „Řemeslo má zlaté …“`,
      options: [`žíly`, `časy`, `dno`, `kořeny`],
      correct: 2
    },
    {
      q: `Doplňte přísloví: „Chudoba cti …“`,
      options: [`netratí`, `zvyšuje`, `kalí`, `nemění`],
      correct: 0
    },
    {
      q: `Doplňte přísloví: „Nechval dne před …“`,
      options: [`soumrakem`, `večerem`, `nocí`, `západem`],
      correct: 1
    },
    {
      q: `Doplňte přísloví: „Kdo pozdě chodí, sám sobě …“`,
      options: [`přeje`, `lže`, `velí`, `škodí`],
      correct: 3
    },
    {
      q: `Doplňte přísloví: „Koho chleba jíš, toho píseň …“`,
      options: [`zpívej`, `chval`, `hraj`, `slož`],
      correct: 0
    },
    {
      q: `Doplňte přísloví: „Sejde z očí, sejde z …“`,
      options: [`srdce`, `mysli`, `paměti`, `hlavy`],
      correct: 1
    },
    {
      q: `Doplňte přísloví: „Kdo po tobě kamenem, ty po něm …“`,
      options: [`růží`, `solí`, `chlebem`, `vínem`],
      correct: 2
    },
    {
      q: `Doplňte přísloví: „Kdo nic nedělá, nic …“`,
      options: [`nedokáže`, `nezmění`, `neztratí`, `nezkazí`],
      correct: 3
    },
    {
      q: `Doplňte přísloví: „Nemluv o provaze v oběšencově …“`,
      options: [`domě`, `světnici`, `přítomnosti`, `rodině`],
      correct: 0
    },
    {
      q: `Doplňte přísloví: „Lež má krátké …“`,
      options: [`ruce`, `prsty`, `vlasy`, `nohy`],
      correct: 3
    }
  ];

  const verdicts = [
    { min: 0, max: 3, text: `Lidová moudrost vám zatím prokluzuje mezi prsty. Tahle přísloví se dnes slýchají jen zřídka a jejich přesné znění zná málokdo. K titulu znalce vede ještě pořádný kus cesty.` },
    { min: 4, max: 6, text: `Slušný základ. Jádro české lidové moudrosti v sobě nesete, jen vám pár klíčových slov uteklo. S trochou opakování se ke znalectví dostanete.` },
    { min: 7, max: 9, text: `Velmi dobré. Přísloví ovládáte poctivě a v jejich přesném znění se neztrácíte. K plnému titulu znalce vám chybí už jen drobnost.` },
    { min: 10, max: 10, text: `Klobouk dolů, jste opravdový znalec. Tahle přísloví znáte přesně tak, jak je říkávali vaši předkové. Titul znalce české lidové moudrosti vám právem náleží.` }
  ];

  const selected = new Array(questions.length).fill(null);
  let evaluated = false;

  document.getElementById(`quiz-title`).textContent = title;
  document.getElementById(`quiz-perex`).textContent = perex;

  const questionsEl = document.getElementById(`questions`);
  const evaluateBtn = document.getElementById(`evaluate-btn`);
  const resultArea = document.getElementById(`result-area`);
  const toast = document.getElementById(`toast`);
  let toastTimer = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add(`show`);
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove(`show`);
    }, 2600);
  }

  function updateEvaluateBtn() {
    const allAnswered = selected.every(function (s) { return s !== null; });
    evaluateBtn.disabled = !allAnswered;
  }

  function buildQuestions() {
    questionsEl.innerHTML = ``;
    questions.forEach(function (item, qi) {
      const box = document.createElement(`div`);
      box.className = `question`;

      const qText = document.createElement(`p`);
      qText.className = `q-text`;
      qText.textContent = (qi + 1) + `. ` + item.q;
      box.appendChild(qText);

      item.options.forEach(function (opt, oi) {
        const btn = document.createElement(`button`);
        btn.type = `button`;
        btn.className = `option`;
        btn.textContent = opt;
        btn.addEventListener(`click`, function () {
          if (evaluated) return;
          selected[qi] = oi;
          const siblings = box.querySelectorAll(`.option`);
          siblings.forEach(function (s) { s.classList.remove(`selected`); });
          btn.classList.add(`selected`);
          updateEvaluateBtn();
        });
        box.appendChild(btn);
      });

      questionsEl.appendChild(box);
    });
  }

  function getVerdict(score) {
    for (let i = 0; i < verdicts.length; i++) {
      if (score >= verdicts[i].min && score <= verdicts[i].max) {
        return verdicts[i].text;
      }
    }
    return ``;
  }

  function evaluate() {
    if (evaluated) return;
    const allAnswered = selected.every(function (s) { return s !== null; });
    if (!allAnswered) {
      showToast(`Odpovězte prosím na všechny otázky`);
      return;
    }

    evaluated = true;
    let score = 0;

    const boxes = questionsEl.querySelectorAll(`.question`);
    boxes.forEach(function (box, qi) {
      box.classList.add(`locked`);
      const opts = box.querySelectorAll(`.option`);
      const correctIdx = questions[qi].correct;
      const chosenIdx = selected[qi];

      if (chosenIdx === correctIdx) score++;

      opts.forEach(function (opt, oi) {
        opt.classList.remove(`selected`);
        if (oi === correctIdx) {
          opt.classList.add(`correct`);
        } else if (oi === chosenIdx) {
          opt.classList.add(`wrong`);
        }
      });

      if (chosenIdx !== correctIdx) {
        const reveal = document.createElement(`p`);
        reveal.className = `reveal`;
        reveal.textContent = `Správná odpověď: ` + questions[qi].options[correctIdx];
        box.appendChild(reveal);
      }
    });

    evaluateBtn.style.display = `none`;

    resultArea.innerHTML = ``;
    const result = document.createElement(`div`);
    result.className = `result`;

    const scoreEl = document.createElement(`p`);
    scoreEl.className = `score`;
    scoreEl.textContent = score + ` z ` + questions.length;
    result.appendChild(scoreEl);

    const verdictEl = document.createElement(`p`);
    verdictEl.className = `verdict`;
    verdictEl.textContent = getVerdict(score);
    result.appendChild(verdictEl);

    const retryBtn = document.createElement(`button`);
    retryBtn.type = `button`;
    retryBtn.className = `btn btn-retry`;
    retryBtn.textContent = `Zkusit znovu`;
    retryBtn.addEventListener(`click`, reset);
    result.appendChild(retryBtn);

    resultArea.appendChild(result);

    result.scrollIntoView({ behavior: `smooth`, block: `start` });
  }

  function reset() {
    evaluated = false;
    for (let i = 0; i < selected.length; i++) selected[i] = null;
    resultArea.innerHTML = ``;
    evaluateBtn.style.display = `block`;
    evaluateBtn.disabled = true;
    buildQuestions();
    window.scrollTo({ top: 0, behavior: `smooth` });
  }

  evaluateBtn.addEventListener(`click`, evaluate);

  buildQuestions();
})();
</script>
</body>
</html>
