<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test osobnosti: Co na obrázku uvidíte jako první? Prozradí to vaši nejvýraznější vlastnost</title>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    margin: 0;
    padding: 40px 16px;
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.9rem; line-height: 1.3; color: #2c2c2c; margin: 0 0 18px; }
  .perex { font-size: 1.1rem; color: #4a4a4a; margin: 0 0 32px; }
  .question {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .q-text { font-weight: bold; font-size: 1.15rem; color: #2c2c2c; margin-bottom: 16px; }
  .option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    color: #3a3a3a;
    font-family: inherit;
    margin-bottom: 12px;
    transition: background 0.15s ease;
  }
  .option:last-child { margin-bottom: 0; }
  .option:hover:not(.locked) { background: #ede8e1; }
  .option.selected { background: #dcd3c7; border: 1px solid #a89e92; font-weight: bold; }
  .option.locked { cursor: default; }
  .option:focus-visible { outline: 2px solid #5b7e5f; outline-offset: 2px; }
  #evaluate {
    background: #5b7e5f;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: inherit;
  }
  #evaluate:hover:not(:disabled) { background: #4a6b4e; }
  #evaluate:disabled { background: #b5b5b5; cursor: not-allowed; }
  .result {
    background: #fefcf9;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-top: 4px solid #5b7e5f;
    padding: 28px;
    margin-top: 32px;
  }
  .result-name { font-size: 2.5rem; font-weight: bold; color: #5b7e5f; text-align: center; margin-bottom: 16px; }
  .result-text { font-size: 1rem; color: #4a4a4a; text-align: center; margin-bottom: 14px; }
  .result-text:last-child { margin-bottom: 0; }
  .result-note { font-size: 0.95rem; color: #756658; text-align: center; font-style: italic; margin-bottom: 20px; }
  #retry {
    background: #8c7b6b;
    color: #ffffff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 24px auto 0;
    font-family: inherit;
  }
  #retry:hover { background: #756658; }
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2c2c2c;
    color: #fff;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    body { padding: 24px 16px; }
    h1 { font-size: 1.6rem; }
    .question { padding: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Test osobnosti: Co na obrázku uvidíte jako první? Prozradí to vaši nejvýraznější vlastnost</h1>
  <p class="perex">První dojem a rychlá volba prozradí o povaze víc než dlouhé zvažování. Odpovězte na deset otázek podle toho, co vás napadne jako první, a ukáže se, která vlastnost ve vás převládá nejsilněji.</p>

  <div id="quiz"></div>

  <button id="evaluate" disabled>Vyhodnotit</button>

  <div id="result" style="display:none;"></div>
</div>

<div id="toast" class="toast"></div>

<script>
(function () {
  const questions = [
    {
      q: `Čeho si na druhých lidech všimnete nejdřív?`,
      options: [
        { letter: `a`, text: `jak se chovají k lidem kolem sebe` },
        { letter: `b`, text: `jestli si pevně jdou za svým` },
        { letter: `c`, text: `jaký mají pohled na věc` },
        { letter: `d`, text: `jestli se na ně dá spolehnout` }
      ]
    },
    {
      q: `Jak nejradši trávíte čas o samotě?`,
      options: [
        { letter: `a`, text: `stejně nevydržíte dlouho bez lidí a někomu se ozvete` },
        { letter: `b`, text: `pustíte se do něčeho, na co jindy není čas` },
        { letter: `c`, text: `ponoříte se do tématu, které vás zrovna chytlo` },
        { letter: `d`, text: `srovnáte si věci kolem sebe a vychutnáte klid` }
      ]
    },
    {
      q: `Jak se připravíte na něco důležitého?`,
      options: [
        { letter: `a`, text: `obrátíte se na lidi, kterým věříte, ať v tom nejste sami` },
        { letter: `b`, text: `vrhnete se do toho a poradíte si za pochodu` },
        { letter: `c`, text: `hledáte netradiční způsob, jak k tomu přistoupit` },
        { letter: `d`, text: `vše si předem rozvrhnete a jdete krok za krokem` }
      ]
    },
    {
      q: `Jak se stavíte ke sporu ve svém okolí?`,
      options: [
        { letter: `a`, text: `snažíte se lidi usmířit a napětí uklidnit` },
        { letter: `b`, text: `řeknete narovinu, co si myslíte, a stojíte si za tím` },
        { letter: `c`, text: `chcete pochopit, proč to druhá strana vidí jinak` },
        { letter: `d`, text: `počkáte, až emoce opadnou, a proberete to v klidu` }
      ]
    },
    {
      q: `Jak se vyrovnáte s nezdarem?`,
      options: [
        { letter: `a`, text: `najdete oporu u blízkých a spolu to rozdýcháte` },
        { letter: `b`, text: `rychle se oklepete a jdete do dalšího pokusu` },
        { letter: `c`, text: `hledáte, kde byla chyba a co si z ní odnést` },
        { letter: `d`, text: `v klidu proberete, co příště udělat jinak` }
      ]
    },
    {
      q: `Co uděláte s nečekanou příležitostí?`,
      options: [
        { letter: `a`, text: `hned ji chcete sdílet s někým, na kom vám záleží` },
        { letter: `b`, text: `chytnete ji, než stačí utéct` },
        { letter: `c`, text: `láká vás hlavně to, kam vás může zavést` },
        { letter: `d`, text: `nejdřív si ji proklepnete, jestli za to stojí` }
      ]
    },
    {
      q: `Jak si jdete za svým?`,
      options: [
        { letter: `a`, text: `tak, aby z toho měli radost i lidé kolem vás` },
        { letter: `b`, text: `naplno a rovnou za cílem, bez okolků` },
        { letter: `c`, text: `vlastní, nevyšlapanou cestou` },
        { letter: `d`, text: `s klidnou hlavou, jeden jistý krok za druhým` }
      ]
    },
    {
      q: `Jak vypadá vaše ideální ráno?`,
      options: [
        { letter: `a`, text: `v klidu u snídaně s někým blízkým` },
        { letter: `b`, text: `svižně, ať můžete rovnou vyrazit za svým` },
        { letter: `c`, text: `pokaždé trochu jinak, podle nálady` },
        { letter: `d`, text: `podle zaběhnutého pořádku, který vám sedí` }
      ]
    },
    {
      q: `Jakou roli si v partě obvykle vezmete?`,
      options: [
        { letter: `a`, text: `toho, kdo drží partu pohromadě a hlídá pohodu` },
        { letter: `b`, text: `toho, kdo udává směr a strhne ostatní` },
        { letter: `c`, text: `toho, kdo přijde s nápady a rozproudí zábavu` },
        { letter: `d`, text: `toho, kdo dohlédne, aby vše klaplo` }
      ]
    },
    {
      q: `Co si nejradši vezmete s sebou na cestu?`,
      options: [
        { letter: `a`, text: `partu blízkých lidí, se kterými je vám dobře` },
        { letter: `b`, text: `chuť poprat se se vším, co se cestou objeví` },
        { letter: `c`, text: `otevřené oči pro všechno nové kolem` },
        { letter: `d`, text: `pečlivě sbalený batoh pro každou situaci` }
      ]
    }
  ];

  const profiles = {
    a: {
      name: `Vřelost`,
      text: `Vaší nejvýraznější vlastností je vřelost. U vás se lidé cítí přijatí a v bezpečí a instinktivně vnímáte, jak druhým je. Vztahy a pohoda blízkých mají u vás přednost a právě z nich čerpáte sílu.`
    },
    b: {
      name: `Odvaha`,
      text: `Nejsilněji se u vás projevuje odvaha. Nečekáte, až se věci vyřeší samy, jdete jim naproti a rozhodnete se dřív než ostatní. Tam, kde jiní váhají, vy už jednáte a svým tahem strhnete i okolí.`
    },
    c: {
      name: `Zvídavost`,
      text: `Vaše nejvýraznější stránka je zvídavost. Přitahuje vás všechno nové a neokoukané a nuda je pro vás horší než riziko. S chutí zkoumáte, jak věci fungují, a nejlíp je vám, když máte co objevovat.`
    },
    d: {
      name: `Rozvaha`,
      text: `Vaší nejsilnější vlastností je rozvaha. Než uděláte krok, zvážíte ho, a proto se na vás dá spolehnout i ve chvíli, kdy ostatní ztrácejí hlavu. Klid, řád a jistota, že věci mají svůj systém, vám dodávají sílu.`
    }
  };

  const answers = new Array(questions.length).fill(null);
  let evaluated = false;

  const quizEl = document.getElementById(`quiz`);
  const evalBtn = document.getElementById(`evaluate`);
  const resultEl = document.getElementById(`result`);
  const toastEl = document.getElementById(`toast`);
  let toastTimer = null;

  function buildQuiz() {
    questions.forEach((item, qi) => {
      const box = document.createElement(`div`);
      box.className = `question`;

      const qText = document.createElement(`div`);
      qText.className = `q-text`;
      qText.textContent = `${qi + 1}. ${item.q}`;
      box.appendChild(qText);

      item.options.forEach((opt) => {
        const btn = document.createElement(`button`);
        btn.type = `button`;
        btn.className = `option`;
        btn.textContent = `${opt.letter}) ${opt.text}`;
        btn.setAttribute(`data-q`, String(qi));
        btn.setAttribute(`data-letter`, opt.letter);
        btn.addEventListener(`click`, function () {
          if (evaluated) return;
          answers[qi] = opt.letter;
          const siblings = box.querySelectorAll(`.option`);
          siblings.forEach((s) => s.classList.remove(`selected`));
          btn.classList.add(`selected`);
          updateEvalState();
        });
        box.appendChild(btn);
      });

      quizEl.appendChild(box);
    });
  }

  function updateEvalState() {
    const allAnswered = answers.every((a) => a !== null);
    evalBtn.disabled = !allAnswered;
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add(`show`);
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove(`show`), 2600);
  }

  function evaluate() {
    if (answers.some((a) => a === null)) {
      showToast(`Odpovězte prosím na všechny otázky`);
      return;
    }
    evaluated = true;

    document.querySelectorAll(`.option`).forEach((o) => o.classList.add(`locked`));
    evalBtn.disabled = true;
    evalBtn.style.display = `none`;

    const tally = { a: 0, b: 0, c: 0, d: 0 };
    answers.forEach((a) => { tally[a] += 1; });

    let max = 0;
    Object.keys(tally).forEach((k) => { if (tally[k] > max) max = tally[k]; });
    const winners = Object.keys(tally).filter((k) => tally[k] === max);

    resultEl.innerHTML = ``;

    const nameEl = document.createElement(`div`);
    nameEl.className = `result-name`;
    nameEl.textContent = winners.map((w) => profiles[w].name).join(` · `);
    resultEl.appendChild(nameEl);

    if (winners.length > 1) {
      const note = document.createElement(`div`);
      note.className = `result-note`;
      note.textContent = `U vás se stejnou silou projevuje více vlastností najednou — všechny jsou pro vás stejně příznačné.`;
      resultEl.appendChild(note);
    }

    winners.forEach((w) => {
      const t = document.createElement(`p`);
      t.className = `result-text`;
      t.textContent = profiles[w].text;
      resultEl.appendChild(t);
    });

    const retry = document.createElement(`button`);
    retry.type = `button`;
    retry.id = `retry`;
    retry.textContent = `Zkusit znovu`;
    retry.addEventListener(`click`, reset);
    resultEl.appendChild(retry);

    resultEl.style.display = `block`;
    resultEl.scrollIntoView({ behavior: `smooth`, block: `start` });
  }

  function reset() {
    for (let i = 0; i < answers.length; i++) answers[i] = null;
    evaluated = false;
    document.querySelectorAll(`.option`).forEach((o) => {
      o.classList.remove(`selected`, `locked`);
    });
    resultEl.style.display = `none`;
    resultEl.innerHTML = ``;
    evalBtn.style.display = `block`;
    evalBtn.disabled = true;
    window.scrollTo({ top: 0, behavior: `smooth` });
  }

  evalBtn.addEventListener(`click`, evaluate);

  buildQuiz();
  updateEvalState();
})();
</script>
</body>
</html>
