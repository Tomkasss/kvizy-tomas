<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90 % Čechů nedá 10/10. Většina vyhoří u deváté otázky. Zeměpis Česka</title>
<style>
* { box-sizing: border-box; }
body { font-family: Georgia,"Times New Roman",serif; background:#f5f0eb; color:#2c2c2c; margin:0; padding:24px 16px; }
.wrap { max-width:720px; margin:0 auto; }
h1 { font-size:1.7rem; line-height:1.3; color:#2c2c2c; }
.perex { font-size:1.1rem; line-height:1.55; color:#4a4a4a; margin-bottom:8px; }
.q { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:28px; margin-bottom:24px; }
.q-text { font-weight:bold; font-size:1.15rem; color:#2c2c2c; margin-bottom:16px; }
.opt { display:block; width:100%; text-align:left; padding:14px 18px; background:#f7f4f0; border:1px solid #d9d2c9; border-radius:8px; font-size:1rem; color:#3a3a3a; margin-bottom:10px; cursor:pointer; font-family:inherit; }
.opt:hover { background:#ede8e1; }
.opt.selected { background:#dcd3c7; border:1px solid #a89e92; font-weight:bold; }
.opt.correct { background:#d4edda; border:1px solid #7cb987; color:#1e5631; }
.opt.wrong { background:#f8d7da; border:1px solid #d4848a; color:#721c24; }
.opt:disabled { cursor:default; }
#submit { background:#5b7e5f; color:#fff; padding:16px 40px; border-radius:8px; font-size:1.1rem; font-weight:bold; border:none; display:block; margin:40px auto 0; cursor:pointer; font-family:inherit; }
#submit:hover { background:#4a6b4e; }
#submit:disabled { background:#b5b5b5; cursor:not-allowed; }
.warn { text-align:center; color:#a05a5a; margin-top:14px; min-height:1.2em; }
#result { background:#fefcf9; border-top:4px solid #5b7e5f; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:28px; margin-top:24px; display:none; }
#score { font-size:2.5rem; font-weight:bold; color:#5b7e5f; text-align:center; margin:0 0 12px; }
#verdict { font-size:1rem; color:#4a4a4a; text-align:center; line-height:1.55; }
#retry { background:#8c7b6b; color:#fff; padding:16px 40px; border-radius:8px; font-size:1.1rem; font-weight:bold; border:none; display:block; margin:24px auto 0; cursor:pointer; font-family:inherit; }
#retry:hover { background:#756658; }
</style>
</head>
<body>
<div class="wrap">
<h1>90 % Čechů nedá 10/10. Většina vyhoří u deváté otázky. Zeměpis Česka</h1>
<p class="perex">Řeky, pohoří, přehrady i krajská sídla. Deset otázek z geografie Česka prověří, jak dobře znáte svou zemi. Plných 10/10 nasbírá jen málokdo a nejtěžší nástraha čeká u deváté otázky. Zvládnete to bez zaváhání?</p>
<div id="quiz"></div>
<button id="submit" disabled>Vyhodnotit</button>
<p class="warn" id="warn"></p>
<div id="result">
<p id="score"></p>
<p id="verdict"></p>
<button id="retry">Zkusit znovu</button>
</div>
</div>
<script>
const questions = [
{ q: `Do kterého moře odvádí své vody řeka Odra?`, opts: [`Severního moře`,`Černého moře`,`Baltského moře`,`Středozemního moře`], correct: 2 },
{ q: `Které město je nejzápadněji položeným městem České republiky?`, opts: [`Aš`,`Cheb`,`Kraslice`,`Mariánské Lázně`], correct: 0 },
{ q: `Které město je správním sídlem Kraje Vysočina?`, opts: [`Havlíčkův Brod`,`Jihlava`,`Třebíč`,`Žďár nad Sázavou`], correct: 1 },
{ q: `Které krajské město leží na řece Moravě?`, opts: [`Zlín`,`Brno`,`Ostrava`,`Olomouc`], correct: 3 },
{ q: `Který rybník má největší rozlohu v České republice?`, opts: [`Rožmberk`,`Bezdrev`,`Svět`,`Horusický rybník`], correct: 0 },
{ q: `Která přehradní nádrž má v Česku největší rozlohu vodní plochy?`, opts: [`Orlík`,`Slapy`,`Lipno`,`Nechranice`], correct: 2 },
{ q: `Který kraj je rozlohou největším krajem České republiky?`, opts: [`Jihočeský`,`Středočeský`,`Plzeňský`,`Moravskoslezský`], correct: 1 },
{ q: `Která chráněná krajinná oblast byla v českých zemích vyhlášena jako vůbec první?`, opts: [`Šumava`,`Moravský kras`,`Křivoklátsko`,`Český ráj`], correct: 3 },
{ q: `Která hora je po Sněžce druhým nejvyšším vrcholem České republiky?`, opts: [`Kotel`,`Studniční hora`,`Luční hora`,`Vysoké Kolo`], correct: 2 },
{ q: `Který vodopád je nejvyšší v České republice?`, opts: [`Pančavský vodopád`,`Mumlavský vodopád`,`Rešovské vodopády`,`Adršpašský vodopád`], correct: 0 }
];
const answers = new Array(questions.length).fill(null);
let locked = false;
const quizEl = document.getElementById('quiz');
const submitBtn = document.getElementById('submit');
const warnEl = document.getElementById('warn');
const letters = ['a','b','c','d'];

function render() {
  quizEl.innerHTML = '';
  questions.forEach((item, qi) => {
    const box = document.createElement('div');
    box.className = 'q';
    const qt = document.createElement('div');
    qt.className = 'q-text';
    qt.textContent = (qi+1) + '. ' + item.q;
    box.appendChild(qt);
    item.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = letters[oi] + ') ' + opt;
      if (answers[qi] === oi) btn.classList.add('selected');
      btn.addEventListener('click', () => {
        if (locked) return;
        answers[qi] = oi;
        render();
        updateSubmit();
      });
      box.appendChild(btn);
    });
    quizEl.appendChild(box);
  });
}
function updateSubmit() {
  const all = answers.every(a => a !== null);
  submitBtn.disabled = !all;
  if (all) warnEl.textContent = '';
}
submitBtn.addEventListener('click', () => {
  if (answers.some(a => a === null)) { warnEl.textContent = 'Odpovězte prosím na všechny otázky'; return; }
  locked = true;
  let score = 0;
  const boxes = quizEl.querySelectorAll('.q');
  boxes.forEach((box, qi) => {
    const opts = box.querySelectorAll('.opt');
    opts.forEach((btn, oi) => {
      btn.disabled = true;
      btn.classList.remove('selected');
      if (oi === questions[qi].correct) btn.classList.add('correct');
      else if (oi === answers[qi]) btn.classList.add('wrong');
    });
    if (answers[qi] === questions[qi].correct) score++;
  });
  showResult(score);
});
function showResult(score) {
  const scoreEl = document.getElementById('score');
  const verdictEl = document.getElementById('verdict');
  scoreEl.textContent = score + ' z 10';
  let text;
  if (score <= 3) text = 'Zeměpis Česka vám zatím splývá do jedné mlhavé mapy. Řeky, pohoří i kraje se pletou a nejvyšší patra tabulek rekordů zůstávají záhadou. Nic se neděje, projděte si správné odpovědi a příště se odrazíte mnohem výš.';
  else if (score <= 6) text = 'Přesně tady se pohybuje většina Čechů. Základ máte pevný, poznáte hlavní řeky, přehrady i krajská města, ale jakmile přijde na druhé nejvyšší vrcholy nebo geografická prvenství, jistota mizí. Kousek vás dělí od opravdového znalce.';
  else if (score <= 9) text = 'Výborný výsledek, tabulky českých rekordů čtete jako otevřenou knihu. Devátá otázka o druhém nejvyšším vrcholu skolila spoustu lidí a vy jste se přes ni buď přenesli, nebo těsně zaváhali. K plnému počtu vám chyběl už jen krok.';
  else text = 'Naprostá špička. Zeměpis Česka ovládáte od nejzápadnějšího města přes největší přehradu až po nejvyšší vodopád. Devátá otázka, na které vyhořela většina, vás ani nezpomalila. Takhle kompletní přehled o vlastní zemi má opravdu jen zlomek lidí.';
  verdictEl.textContent = text;
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}
document.getElementById('retry').addEventListener('click', () => {
  locked = false;
  for (let i = 0; i < answers.length; i++) answers[i] = null;
  document.getElementById('result').style.display = 'none';
  warnEl.textContent = '';
  render();
  updateSubmit();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
render();
updateSubmit();
</script>
</body>
</html>
