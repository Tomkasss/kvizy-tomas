<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test pro seniory: myslí vám to i v důchodu lépe než mladé generaci? Zkuste 10 otázek</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    margin: 0;
    padding: 40px 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.9rem; line-height: 1.3; color: #2c2c2c; margin: 0 0 20px; }
  .perex { font-size: 1.1rem; color: #4a4a4a; margin: 0 0 36px; }
  .question {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .qtext { font-weight: bold; font-size: 1.15rem; color: #2c2c2c; margin: 0 0 16px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    color: #3a3a3a;
    font-family: inherit;
    transition: background 0.15s;
  }
  .option:hover:not(:disabled) { background: #ede8e1; }
  .option.selected { background: #dcd3c7; border: 1px solid #a89e92; font-weight: bold; }
  .option.correct { background: #d4edda; border: 1px solid #7cb987; color: #1e5631; }
  .option.wrong { background: #f8d7da; border: 1px solid #d4848a; color: #721c24; }
  .option:disabled { cursor: default; }
  .option:focus-visible { outline: 2px solid #5b7e5f; outline-offset: 2px; }
  .btn-eval {
    background: #5b7e5f;
    color: #fff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: inherit;
  }
  .btn-eval:hover:not(:disabled) { background: #4a6b4e; }
  .btn-eval:disabled { background: #b5b5b5; cursor: not-allowed; }
  .result {
    background: #fefcf9;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-top: 4px solid #5b7e5f;
    padding: 28px;
    margin-top: 40px;
  }
  .score { font-size: 2.5rem; font-weight: bold; color: #5b7e5f; text-align: center; margin: 0 0 12px; }
  .verdict { font-size: 1rem; color: #4a4a4a; text-align: center; margin: 0; }
  .btn-retry {
    background: #8c7b6b;
    color: #fff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: inherit;
  }
  .btn-retry:hover { background: #756658; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2c2c2c;
    color: #fff;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 0.95rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    body { padding: 24px 16px; }
    h1 { font-size: 1.5rem; }
    .question, .result { padding: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="quiz-title"></h1>
  <p class="perex" id="quiz-perex"></p>
  <div id="questions"></div>
  <button class="btn-eval" id="evalBtn" disabled>Vyhodnotit</button>
  <div id="resultArea"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  const title = `Test pro seniory: myslí vám to i v důchodu lépe než mladé generaci? Zkuste 10 otázek`;
  const perex = `Vaše generace pochytila za život spoustu pojmů, na které dnešní třicátníci jen krčí rameny. Deset otázek napříč nejrůznějšími obory prověří, jestli vám to v důchodu myslí pořád ostřeji než mladým. Kolik z nich dáte?`;

  const questions = [
    {
      q: `Jak se v myslivecké mluvě nazývá dospělá samice divokého prasete?`,
      options: [`bachyně`, `kňour`, `lončák`, `sele`],
      correct: 0
    },
    {
      q: `Na který den v týdnu primárně připadá židovský den odpočinku zvaný šabat?`,
      options: [`pátek`, `sobota`, `neděle`, `pondělí`],
      correct: 1
    },
    {
      q: `Která z těchto vojenských hodností je nejvyšší?`,
      options: [`poručík`, `kapitán`, `major`, `nadporučík`],
      correct: 2
    },
    {
      q: `Jak se nazývá mužský skočný lidový tanec ze Slovácka?`,
      options: [`odzemek`, `čardáš`, `mateník`, `verbuňk`],
      correct: 3
    },
    {
      q: `Jaký předmět označuje slovo valaška?`,
      options: [`sekeru na dlouhém topůrku`, `dřevěnou pastýřskou píšťalu`, `vlněnou pokrývku na ramena`, `hliněný džbán na žinčici`],
      correct: 0
    },
    {
      q: `Jak se odborně nazývá sběratel poštovních známek?`,
      options: [`faleristik`, `filatelista`, `numismatik`, `notafil`],
      correct: 1
    },
    {
      q: `Jak se v divadle nazývá osoba, která napovídá hercům text?`,
      options: [`inspicient`, `dramaturg`, `suflér`, `kulisák`],
      correct: 2
    },
    {
      q: `Jak se nazývá kuchařská úprava, při níž se pokrm polije alkoholem a zapálí?`,
      options: [`gratinování`, `blanšírování`, `glazování`, `flambování`],
      correct: 3
    },
    {
      q: `Jak se nazývá množení rostlin pomocí zakořeňování odříznutých částí?`,
      options: [`řízkování`, `roubování`, `hřížení`, `očkování`],
      correct: 0
    },
    {
      q: `Jak se nazývá podzimní sklizeň vinných hroznů?`,
      options: [`dožínky`, `senoseč`, `vinobraní`, `posvícení`],
      correct: 2
    }
  ];

  const verdicts = [
    { min: 0, max: 3, text: `Tentokrát to nevyšlo podle představ, ale hlavu věšet nemusíte. Řada těchto pojmů se dnes slýchá málokdy a snadno vypadnou z paměti. Stačí je párkrát oprášit a příště budete o kolo dál.` },
    { min: 4, max: 6, text: `Poctivý průměr, přesně tam, kde se drží většina. Něco jste trefili s jistotou, jinde jste zaváhali. Váš přehled má pevný základ a nad mladou generací máte pořád náskok.` },
    { min: 7, max: 9, text: `Výborný výkon. Vybavíte si výrazy z myslivosti, tradic i kuchyně, u kterých většina třicátníků jen tápe. Léta pozorného vstřebávání se očividně vyplatila a paměť vám slouží skvěle.` },
    { min: 10, max: 10, text: `Naprostá trefa. Deset oborů, deset zásahů. Tohle skóre je jasný důkaz, že vám to v důchodu myslí bystřeji než leckomu o generaci mladšímu. Klobouk dolů.` }
  ];

  const answers = new Array(questions.length).fill(null);
  let evaluated = false;

  const titleEl = document.getElementById(`quiz-title`);
  const perexEl = document.getElementById(`quiz-perex`);
  const questionsEl = document.getElementById(`questions`);
  const evalBtn = document.getElementById(`evalBtn`);
  const resultArea = document.getElementById(`resultArea`);
  const toast = document.getElementById(`toast`);

  titleEl.textContent = title;
  perexEl.textContent = perex;

  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add(`show`);
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove(`show`); }, 2600);
  }

  function updateEvalState() {
    const allAnswered = answers.every(function (a) { return a !== null; });
    evalBtn.disabled = !allAnswered;
  }

  function buildQuestions() {
    questionsEl.innerHTML = ``;
    questions.forEach(function (item, qi) {
      const box = document.createElement(`div`);
      box.className = `question`;

      const qtext = document.createElement(`p`);
      qtext.className = `qtext`;
      qtext.textContent = (qi + 1) + `. ` + item.q;
      box.appendChild(qtext);

      const opts = document.createElement(`div`);
      opts.className = `options`;

      item.options.forEach(function (optText, oi) {
        const btn = document.createElement(`button`);
        btn.type = `button`;
        btn.className = `option`;
        btn.textContent = optText;
        btn.setAttribute(`data-q`, String(qi));
        btn.setAttribute(`data-o`, String(oi));
        btn.addEventListener(`click`, function () {
          if (evaluated) return;
          answers[qi] = oi;
          const siblings = opts.querySelectorAll(`.option`);
          siblings.forEach(function (s) { s.classList.remove(`selected`); });
          btn.classList.add(`selected`);
          updateEvalState();
        });
        opts.appendChild(btn);
      });

      box.appendChild(opts);
      questionsEl.appendChild(box);
    });
  }

  function evaluate() {
    if (evaluated) return;
    const allAnswered = answers.every(function (a) { return a !== null; });
    if (!allAnswered) {
      showToast(`Odpovězte prosím na všechny otázky`);
      return;
    }
    evaluated = true;

    let score = 0;
    const boxes = questionsEl.querySelectorAll(`.question`);
    boxes.forEach(function (box, qi) {
      const correctIdx = questions[qi].correct;
      const chosenIdx = answers[qi];
      if (chosenIdx === correctIdx) score++;

      const optBtns = box.querySelectorAll(`.option`);
      optBtns.forEach(function (btn, oi) {
        btn.disabled = true;
        btn.classList.remove(`selected`);
        if (oi === correctIdx) {
          btn.classList.add(`correct`);
        } else if (oi === chosenIdx) {
          btn.classList.add(`wrong`);
        }
      });
    });

    let verdictText = ``;
    for (let i = 0; i < verdicts.length; i++) {
      if (score >= verdicts[i].min && score <= verdicts[i].max) {
        verdictText = verdicts[i].text;
        break;
      }
    }

    resultArea.innerHTML = ``;
    const result = document.createElement(`div`);
    result.className = `result`;

    const scoreEl = document.createElement(`p`);
    scoreEl.className = `score`;
    scoreEl.textContent = score + ` z ` + questions.length;
    result.appendChild(scoreEl);

    const verdictEl = document.createElement(`p`);
    verdictEl.className = `verdict`;
    verdictEl.textContent = verdictText;
    result.appendChild(verdictEl);

    const retryBtn = document.createElement(`button`);
    retryBtn.type = `button`;
    retryBtn.className = `btn-retry`;
    retryBtn.textContent = `Zkusit znovu`;
    retryBtn.addEventListener(`click`, resetQuiz);
    result.appendChild(retryBtn);

    resultArea.appendChild(result);

    evalBtn.style.display = `none`;

    result.scrollIntoView({ behavior: `smooth`, block: `start` });
  }

  function resetQuiz() {
    evaluated = false;
    for (let i = 0; i < answers.length; i++) answers[i] = null;
    resultArea.innerHTML = ``;
    evalBtn.style.display = `block`;
    evalBtn.disabled = true;
    buildQuestions();
    window.scrollTo({ top: 0, behavior: `smooth` });
  }

  evalBtn.addEventListener(`click`, evaluate);

  buildQuestions();
  updateEvalState();
})();
</script>
</body>
</html>
