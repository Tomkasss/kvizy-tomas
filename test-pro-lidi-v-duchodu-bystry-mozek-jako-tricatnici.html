<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test pro lidi v důchodu: máte pořád bystrý mozek jako dnešní třicátníci?</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: #f5f0eb;
    color: #2c2c2c;
    margin: 0;
    padding: 40px 16px;
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.9rem; line-height: 1.3; color: #2c2c2c; margin: 0 0 18px; }
  .perex { font-size: 1.1rem; color: #4a4a4a; margin: 0 0 32px; }
  .q-box {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 28px;
    margin-bottom: 24px;
  }
  .q-text { font-weight: bold; font-size: 1.15rem; color: #2c2c2c; margin-bottom: 16px; }
  .q-input {
    width: 100%;
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 1rem;
    color: #3a3a3a;
    padding: 14px 18px;
    background: #f7f4f0;
    border: 1px solid #d9d2c9;
    border-radius: 8px;
  }
  .q-input:focus { outline: none; border-color: #a89e92; background: #ede8e1; }
  .q-input:disabled { cursor: not-allowed; }
  .q-box.correct .q-input { background: #d4edda; border: 1px solid #7cb987; color: #1e5631; }
  .q-box.wrong .q-input { background: #f8d7da; border: 1px solid #d4848a; color: #721c24; }
  .reveal { margin-top: 12px; font-size: 0.98rem; color: #721c24; }
  .reveal.ok { color: #1e5631; }
  .btn-eval {
    background: #5b7e5f;
    color: #fff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: "Georgia", "Times New Roman", serif;
  }
  .btn-eval:hover { background: #4a6b4e; }
  .btn-eval:disabled { background: #b5b5b5; cursor: not-allowed; }
  .result {
    background: #fefcf9;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-top: 4px solid #5b7e5f;
    padding: 28px;
    margin-top: 32px;
    text-align: center;
  }
  .score { font-size: 2.5rem; font-weight: bold; color: #5b7e5f; }
  .verdict { font-size: 1rem; color: #4a4a4a; margin-top: 8px; }
  .btn-retry {
    background: #8c7b6b;
    color: #fff;
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    display: block;
    margin: 40px auto 0;
    font-family: "Georgia", "Times New Roman", serif;
  }
  .btn-retry:hover { background: #756658; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%);
    background: #2c2c2c;
    color: #fff;
    padding: 14px 26px;
    border-radius: 8px;
    font-size: 1rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="quiz-title"></h1>
  <p class="perex" id="quiz-perex"></p>
  <div id="questions"></div>
  <button class="btn-eval" id="btn-eval" disabled>Vyhodnotit</button>
  <div id="result-area"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function () {
  const TITLE = `Test pro lidi v důchodu: máte pořád bystrý mozek jako dnešní třicátníci? Pak dáte aspoň 7/10`;
  const PEREX = `Deset úloh na logiku, počítání z hlavy a pozornost. Žádné vědomosti, žádná kalkulačka. V důchodu si ověřte, jestli vám mozek šlape jako dnešním třicátníkům. Kdo dá aspoň sedm z deseti, může být na svou hlavu pyšný.`;

  const QUESTIONS = [
    { q: `Kolik řezů musíte udělat, chcete-li prkno rozřezat na šest stejně dlouhých dílů?`, answers: [`5`, `pět`] },
    { q: `Kolik krychlových metrů hlíny je v díře o rozměrech metr krát metr krát metr?`, answers: [`0`, `nula`, `žádný`, `žádná`, `žádné`, `nic`] },
    { q: `Kolik minut zbývá do půlnoci, jestliže před čtyřiceti minutami zbývalo do půlnoci dvakrát tolik minut než teď?`, answers: [`40`, `čtyřicet`] },
    { q: `Kolikrát se písmeno O vyskytuje ve slově ČOKOLÁDOVÝ?`, answers: [`3`, `tři`, `třikrát`] },
    { q: `Jaké číslo přidáte k pěti číslům s průměrem dvacet, aby průměr všech šesti čísel klesl na osmnáct?`, answers: [`8`, `osm`] },
    { q: `Kolik dvouciferných čísel je dělitelných sedmi?`, answers: [`13`, `třináct`] },
    { q: `Kolik čtverců všech velikostí dohromady najdete na hrací ploše o rozměru tři krát tři pole?`, answers: [`14`, `čtrnáct`] },
    { q: `Jaký den v týdnu bude za sto dní, jestliže dnes je pondělí?`, answers: [`středa`, `ve středu`] },
    { q: `Kolik jablek máte, vezmete-li si dvě ze tří jablek na stole?`, answers: [`2`, `dvě`, `dva`] },
    { q: `Jaké je největší ze tří po sobě jdoucích celých čísel, jejichž součet je šedesát?`, answers: [`21`, `dvacet jedna`, `dvacet jednu`] }
  ];

  const TIERS = [
    { min: 0, max: 3, text: `Hlava dnes trochu zaspala. Většina těch úloh spoléhá na to, že člověk vypálí první odpověď, která ho napadne, a už si ji nepřezkouší. Nic dramatického. Mozek je jako sval, pár týdnů křížovek, karet nebo počítání nákupu z hlavy udělá znatelný rozdíl.` },
    { min: 4, max: 6, text: `Solidní výsledek, přesně tady končí většina lidí bez ohledu na věk. Tam, kde stačil přímý výpočet, jste uspěli. Tam, kde byla schovaná past, vás intuice zavedla vedle. Rezervy máte, ale hlava rozhodně funguje spolehlivě.` },
    { min: 7, max: 9, text: `Výborně. Tohle je nad průměrem populace. Čtete pozorně, počítáte přesně a nenecháte se nachytat zdánlivě jasnou odpovědí. Váš mozek v ničem nezaostává za dnešními třicátníky, spíš naopak.` },
    { min: 10, max: 10, text: `Bezchybný výkon. Pozornost, logika i počítání z hlavy vám jdou naprosto spolehlivě. S takovou hlavou by se leckterý třicátník musel pěkně ohánět, aby vám stačil.` }
  ];

  function normalize(s) {
    return s
      .toLowerCase()
      .normalize(`NFD`)
      .replace(/[\u0300-\u036f]/g, ``)
      .replace(/\s+/g, ` `)
      .trim();
  }

  const titleEl = document.getElementById(`quiz-title`);
  const perexEl = document.getElementById(`quiz-perex`);
  const questionsEl = document.getElementById(`questions`);
  const evalBtn = document.getElementById(`btn-eval`);
  const resultArea = document.getElementById(`result-area`);
  const toast = document.getElementById(`toast`);

  titleEl.textContent = TITLE;
  perexEl.textContent = PEREX;

  let evaluated = false;
  const inputs = [];

  function buildQuestions() {
    questionsEl.innerHTML = ``;
    inputs.length = 0;
    QUESTIONS.forEach(function (item, i) {
      const box = document.createElement(`div`);
      box.className = `q-box`;

      const qt = document.createElement(`div`);
      qt.className = `q-text`;
      qt.textContent = (i + 1) + `. ` + item.q;
      box.appendChild(qt);

      const input = document.createElement(`input`);
      input.type = `text`;
      input.className = `q-input`;
      input.setAttribute(`aria-label`, `Odpověď na otázku ` + (i + 1));
      input.setAttribute(`autocomplete`, `off`);
      box.appendChild(input);

      questionsEl.appendChild(box);
      inputs.push({ box: box, input: input });

      input.addEventListener(`input`, updateEvalState);
    });
  }

  function allAnswered() {
    return inputs.every(function (o) { return o.input.value.trim() !== ``; });
  }

  function updateEvalState() {
    if (evaluated) return;
    evalBtn.disabled = !allAnswered();
  }

  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add(`show`);
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove(`show`); }, 2600);
  }

  evalBtn.addEventListener(`click`, function () {
    if (evaluated) return;
    if (!allAnswered()) {
      showToast(`Odpovězte prosím na všechny otázky`);
      return;
    }
    evaluate();
  });

  function evaluate() {
    evaluated = true;
    let score = 0;

    inputs.forEach(function (o, i) {
      const userNorm = normalize(o.input.value);
      const accepted = QUESTIONS[i].answers.map(normalize);
      const isCorrect = accepted.indexOf(userNorm) !== -1;

      o.input.disabled = true;
      if (isCorrect) {
        o.box.classList.add(`correct`);
        score++;
      } else {
        o.box.classList.add(`wrong`);
        const rev = document.createElement(`div`);
        rev.className = `reveal`;
        rev.textContent = `Správná odpověď: ` + QUESTIONS[i].answers[0];
        o.box.appendChild(rev);
      }
    });

    evalBtn.disabled = true;
    evalBtn.style.display = `none`;
    showResult(score);
  }

  function showResult(score) {
    const tier = TIERS.find(function (t) { return score >= t.min && score <= t.max; });

    const box = document.createElement(`div`);
    box.className = `result`;

    const sc = document.createElement(`div`);
    sc.className = `score`;
    sc.textContent = score + ` z ` + QUESTIONS.length;
    box.appendChild(sc);

    const vd = document.createElement(`div`);
    vd.className = `verdict`;
    vd.textContent = tier ? tier.text : ``;
    box.appendChild(vd);

    const retry = document.createElement(`button`);
    retry.className = `btn-retry`;
    retry.textContent = `Zkusit znovu`;
    retry.addEventListener(`click`, resetQuiz);
    box.appendChild(retry);

    resultArea.appendChild(box);
    box.scrollIntoView({ behavior: `smooth`, block: `start` });
  }

  function resetQuiz() {
    evaluated = false;
    resultArea.innerHTML = ``;
    evalBtn.style.display = `block`;
    evalBtn.disabled = true;
    buildQuestions();
    window.scrollTo({ top: 0, behavior: `smooth` });
  }

  buildQuestions();
})();
</script>
</body>
</html>
